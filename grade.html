<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<script src="/profiles.js"></script>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>성적 분석</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" rel="stylesheet">
<style>
  :root {
    --bg: #F2F3F5;
    --surface: #FFFFFF;
    --surface-soft: #EBEDF0;
    --text-main: #17181C;
    --text-sub: #4A4E57;
    --line: #E2E4E9;
    --line-strong: #C9CDD4;
    --accent: #0D9488;
    --accent-dark: #0B7A70;
    --school: #E53935;
    --mock: #1E88E5;
    --ink: #1F2430;
    --ink-dark: #11141B;
  }
  * { box-sizing: border-box; }
  body {
    font-family: "Malgun Gothic", "맑은 고딕", sans-serif;
    background: var(--bg);
    margin: 0;
    padding: 20px;
    color: var(--text-main);
  }
  .container {
    max-width: 960px;
    margin: auto;
    background: var(--surface);
    border-radius: 16px;
    box-shadow: 0 4px 20px rgba(62,39,35,0.06);
    padding: 36px;
    border: 1px solid var(--line);
  }
  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 24px;
    flex-wrap: wrap;
    gap: 8px;
  }
  h1 { margin: 0; font-size: 24px; }
  .nav-btn {
    background: var(--accent); color: white; border: none; border-radius: 6px;
    padding: 8px 16px; cursor: pointer; font-size: 13px; font-weight: 500; text-decoration: none;
  }
  .nav-btn:hover { background: var(--accent-dark); }

  /* 입력 */
  .input-section {
    background: var(--surface-soft); border-radius: 12px; padding: 20px;
    margin-bottom: 24px; border: 1px solid var(--line);
  }
  .input-section h3 { margin: 0 0 14px 0; font-size: 15px; color: var(--text-sub); }
  .input-row { display: flex; gap: 10px; flex-wrap: wrap; align-items: flex-end; }
  .input-group { display: flex; flex-direction: column; gap: 4px; }
  .input-group label { font-size: 12px; color: var(--text-sub); font-weight: 600; }
  .input-group input, .input-group select {
    padding: 8px 10px; border: 1px solid var(--line-strong); border-radius: 6px; font-size: 14px;
  }
  .input-group input { width: 100px; }
  .input-group input[type="date"] { width: 150px; }
  .input-group input[type="text"] { width: 150px; }
  .input-group select { width: 130px; }
  .input-group input:focus, .input-group select:focus { outline: none; border-color: var(--accent); }
  .dob-selects { display: flex; gap: 6px; }
  .dob-selects select { width: auto; flex: 1; min-width: 0; }
  .dob-selects select#dobYear { flex: 1.3; }
  .subj-input-wrap { position: relative; }
  .subj-remove {
    position: absolute; top: -6px; right: -6px; width: 16px; height: 16px; line-height: 14px;
    border-radius: 50%; background: var(--line-strong); color: var(--text-sub); border: none;
    font-size: 11px; cursor: pointer; padding: 0; text-align: center;
  }
  .subj-remove:hover { background: var(--school); color: #fff; }
  .add-btn {
    padding: 8px 20px; background: var(--accent); color: white; border: none;
    border-radius: 6px; font-size: 14px; font-weight: 600; cursor: pointer; height: 36px;
  }
  .add-btn:hover { background: var(--accent-dark); }
  .ghost-btn {
    padding: 8px 14px; background: transparent; color: var(--accent); border: 1px dashed var(--accent);
    border-radius: 6px; font-size: 13px; font-weight: 600; cursor: pointer; height: 36px;
  }
  .ghost-btn:hover { background: rgba(0,137,123,0.06); }

  /* 업로드 영역 */
  .upload-divider { height: 1px; background: var(--line); margin: 18px 0; }
  .upload-row { display: flex; gap: 14px; align-items: stretch; flex-wrap: wrap; }
  .dropzone {
    flex: 1; min-width: 240px; border: 2px dashed var(--line-strong); border-radius: 10px;
    padding: 18px; text-align: center; color: var(--text-sub); cursor: pointer;
    background: var(--surface); transition: all .15s; font-size: 13px;
  }
  .dropzone.drag { border-color: var(--accent); background: rgba(0,137,123,0.06); color: var(--accent-dark); }
  .dropzone strong { color: var(--text-main); }
  .ocr-box {
    min-width: 200px; border: 2px dashed var(--line-strong); border-radius: 10px;
    padding: 18px; text-align: center; color: var(--text-sub); cursor: pointer;
    background: var(--surface); transition: all .15s; font-size: 13px; display: flex;
    flex-direction: column; justify-content: center; gap: 4px;
  }
  .ocr-box:hover { border-color: var(--accent); color: var(--accent-dark); }
  .ocr-box.drag { border-color: var(--accent); background: rgba(0,137,123,0.06); color: var(--accent-dark); }

  /* 범례 */
  .legend { display: flex; gap: 20px; justify-content: center; margin-bottom: 20px; font-size: 14px; }
  .legend-item { display: flex; align-items: center; gap: 6px; }
  .legend-dot { width: 14px; height: 14px; border-radius: 50%; }

  /* 그래프 */
  .charts-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 24px; }
  @media (max-width: 720px) { .charts-grid { grid-template-columns: 1fr; } }
  .chart-box {
    background: var(--surface); border-radius: 12px; padding: 16px;
    border: 1px solid var(--line);
  }
  .chart-box h3 { margin: 0 0 10px 0; font-size: 15px; color: var(--text-sub); text-align: center; }
  canvas { max-height: 240px; }

  /* 통계 */
  .stats { display: flex; gap: 12px; margin-bottom: 24px; flex-wrap: wrap; }
  .stat-card {
    flex: 1; min-width: 140px; background: var(--surface-soft); border-radius: 10px;
    padding: 14px; text-align: center; border: 1px solid var(--line);
  }
  .stat-card .subject { font-size: 13px; color: var(--text-sub); margin-bottom: 4px; }
  .stat-card .scores { display: flex; justify-content: center; gap: 16px; }
  .stat-card .score-col { text-align: center; }
  .stat-card .score-col .type { font-size: 10px; font-weight: 700; margin-bottom: 2px; }
  .stat-card .score-col .avg { font-size: 22px; font-weight: 700; }
  .stat-card .score-col .detail { font-size: 10px; color: var(--text-sub); }
  .type-school { color: var(--school); }
  .type-mock { color: var(--mock); }

  /* 테이블 */
  .table-section h3 { margin: 0 0 12px 0; font-size: 15px; color: var(--text-sub); }
  .table-wrap { overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  th {
    background: var(--surface-soft); padding: 9px 6px; text-align: center;
    border-bottom: 2px solid var(--line-strong); font-weight: 600; font-size: 12px; white-space: nowrap;
  }
  td { padding: 9px 6px; text-align: center; border-bottom: 1px solid var(--line); white-space: nowrap; }
  tr:hover { background: #FFF8E1; }
  .tag-school { background: #FFEBEE; color: var(--school); padding: 2px 8px; border-radius: 10px; font-size: 11px; font-weight: 700; }
  .tag-mock { background: #E3F2FD; color: var(--mock); padding: 2px 8px; border-radius: 10px; font-size: 11px; font-weight: 700; }
  .action-btn {
    background: none; border: 1px solid var(--line-strong); color: var(--text-sub);
    border-radius: 4px; padding: 3px 8px; cursor: pointer; font-size: 11px; margin: 0 2px;
  }
  .action-btn:hover { border-color: var(--accent); color: var(--accent); }
  .action-btn.del:hover { border-color: #C62828; color: #C62828; }
  .editing td input, .editing td select {
    width: 100%; min-width: 60px; padding: 4px 6px; border: 1px solid var(--accent);
    border-radius: 4px; font-size: 12px; text-align: center; box-sizing: border-box;
  }
  .empty-msg { text-align: center; color: var(--text-sub); padding: 30px; font-size: 14px; }

  /* 공부 성향 분석 */
  .analysis-result {
    margin-top: 16px; background: var(--surface); border: 1px solid var(--line);
    border-left: 4px solid var(--accent); border-radius: 10px; padding: 18px 20px;
    font-size: 14px; line-height: 1.9; color: var(--text-main); white-space: pre-line;
  }
  .analysis-result .char-count { display: block; margin-top: 12px; font-size: 12px; color: var(--text-sub); text-align: right; }
  .analysis-result h4 { margin: 0 0 8px; font-size: 16px; color: var(--accent-dark); }

  .saved-indicator {
    position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
    background: var(--accent); color: white; padding: 8px 20px;
    border-radius: 20px; font-size: 13px; opacity: 0; transition: opacity 0.3s;
    pointer-events: none; z-index: 999;
  }
  .saved-indicator.show { opacity: 1; }

  /* 모달 (미리보기 / OCR 편집) */
  .modal-overlay {
    position: fixed; inset: 0; background: rgba(62,39,35,0.45); display: none;
    align-items: center; justify-content: center; z-index: 1000; padding: 20px;
  }
  .modal-overlay.show { display: flex; }
  .modal {
    background: var(--surface); border-radius: 14px; padding: 24px; max-width: 640px; width: 100%;
    max-height: 86vh; overflow-y: auto; border: 1px solid var(--line); box-shadow: 0 10px 40px rgba(62,39,35,0.2);
  }
  .modal h3 { margin: 0 0 4px 0; font-size: 18px; }
  .modal .sub { color: var(--text-sub); font-size: 13px; margin: 0 0 16px 0; }
  .modal-actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 18px; }
  .modal table input, .modal table select { padding: 5px 7px; border: 1px solid var(--line-strong); border-radius: 5px; font-size: 13px; }
  .modal table input[type="number"] { width: 70px; text-align: center; }
  .modal table input[type="text"] { width: 110px; }
  .ocr-progress { font-size: 13px; color: var(--accent-dark); margin-top: 6px; }
  .meta-row { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 14px; }

  /* 사주·MBTI 성향 분석 결과 */
  .an { font-family:'Pretendard',-apple-system,'Malgun Gothic',sans-serif; }
  .an-top { display:flex; gap:10px; flex-wrap:wrap; margin-bottom:18px; }
  .an-chip { flex:1; min-width:130px; background:var(--surface-soft); border:1px solid var(--line); border-radius:12px; padding:11px 14px; }
  .an-chip b { display:block; font-size:11px; color:var(--text-sub); font-weight:700; margin-bottom:4px; }
  .an-chip .v { font-size:15px; font-weight:800; color:var(--text-main); letter-spacing:-.2px; }
  .bar-row { margin:11px 0; }
  .bar-row .lab { display:flex; justify-content:space-between; font-size:13px; font-weight:600; margin-bottom:5px; color:var(--text-main); }
  .bar-row .lab .sc { color:var(--accent-dark); font-weight:800; }
  .bar-track { height:9px; background:var(--surface-soft); border-radius:99px; overflow:hidden; }
  .bar-fill { height:100%; border-radius:99px; background:linear-gradient(90deg,#34D3C4,var(--accent)); transition:width .7s cubic-bezier(.2,.8,.2,1); }
  .daynight { display:flex; gap:10px; margin:18px 0 6px; }
  .dn-card { flex:1; border-radius:14px; padding:13px; text-align:center; border:1.5px solid var(--line); background:var(--surface-soft); font-size:13px; font-weight:600; color:var(--text-sub); }
  .dn-card.on { border-color:var(--accent); background:rgba(13,148,136,.09); color:var(--accent-dark); }
  .dn-card .big { font-size:22px; display:block; margin-bottom:2px; }
  .an-summary { margin-top:14px; font-size:14px; line-height:1.92; color:var(--text-main); }
  .an-tip { margin-top:14px; background:#FFF8E1; border:1px solid #FFE9A8; border-radius:12px; padding:13px 16px; font-size:13.5px; line-height:1.7; color:#7A5E12; }
  .an-tip b { color:#8A6D1A; }
  .an-disclaimer { margin-top:12px; font-size:11.5px; color:var(--text-sub); line-height:1.6; }
</style>
<link rel="manifest" href="/app.webmanifest">
<meta name="theme-color" content="#0D9488">
<link rel="apple-touch-icon" href="/apple-touch-icon.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="한번에">
<script src="/pwa.js" defer></script>
<script src="/menu.js" defer></script>
</head>
<body>
<div class="container">
  <div class="header">
    <h1>📊 성적 분석</h1>
    <a class="nav-btn" href="app.html">🏠 메인</a>
  </div>

  <div class="input-section">
    <h3>성적 입력</h3>
    <div class="input-row" id="manualRow">
      <div class="input-group">
        <label>구분</label>
        <select id="inputType">
          <option value="school">🏫 학교 성적</option>
          <option value="mock">📝 모의고사</option>
        </select>
      </div>
      <div class="input-group">
        <label>날짜</label>
        <input type="date" id="inputDate">
      </div>
      <div class="input-group">
        <label>시험 이름</label>
        <input type="text" id="inputExam" placeholder="예: 중간고사">
      </div>
      <!-- 과목별 점수 입력칸은 동적 생성 -->
      <div id="subjectInputs" style="display:contents;"></div>
      <button class="ghost-btn" id="addSubjectBtn" type="button">+ 과목 추가</button>
      <button class="add-btn" id="addBtn">추가</button>
    </div>

    <div class="upload-divider"></div>

    <div class="upload-row">
      <div class="dropzone" id="dropzone">
        <p style="margin:0 0 4px 0;">📁 <strong>엑셀/CSV 파일</strong>을 끌어다 놓거나 클릭해서 선택</p>
        <p style="margin:0; font-size:12px;">여러 시험·여러 과목을 한 번에 불러옵니다 (.xlsx · .csv)</p>
        <input type="file" id="fileInput" accept=".xlsx,.xls,.csv" multiple style="display:none;">
      </div>
      <div class="ocr-box" id="ocrBox">
        <div>📷 <strong>성적표 사진</strong></div>
        <div style="font-size:12px;">끌어다 놓거나 클릭·붙여넣기(Ctrl+V) — 점수 자동 인식 (OCR)</div>
        <input type="file" id="ocrInput" accept="image/*" capture="environment" style="display:none;">
      </div>
    </div>
  </div>

  <div class="input-section">
    <h3>🧭 사주·MBTI 성향 분석</h3>
    <div class="input-row">
      <div class="input-group">
        <label>생년월일</label>
        <div class="dob-selects">
          <select id="dobYear"></select>
          <select id="dobMonth"></select>
          <select id="dobDay"></select>
        </div>
        <input type="hidden" id="dobInput">
      </div>
      <div class="input-group">
        <label>태어난 시각 (선택)</label>
        <select id="birthTimeInput">
          <option value="">모름</option>
          <option value="0">자시 (23:30~01:30)</option>
          <option value="2">축시 (01:30~03:30)</option>
          <option value="4">인시 (03:30~05:30)</option>
          <option value="6">묘시 (05:30~07:30)</option>
          <option value="8">진시 (07:30~09:30)</option>
          <option value="10">사시 (09:30~11:30)</option>
          <option value="12">오시 (11:30~13:30)</option>
          <option value="14">미시 (13:30~15:30)</option>
          <option value="16">신시 (15:30~17:30)</option>
          <option value="18">유시 (17:30~19:30)</option>
          <option value="20">술시 (19:30~21:30)</option>
          <option value="22">해시 (21:30~23:30)</option>
        </select>
      </div>
      <div class="input-group">
        <label>학교급</label>
        <select id="levelInput">
          <option value="auto">나이로 자동</option>
          <option value="elem">초등</option>
          <option value="mid">중등</option>
          <option value="high">고등</option>
        </select>
      </div>
      <div class="input-group">
        <label>고교 유형 (고등)</label>
        <select id="hsTypeInput">
          <option value="">선택 안 함</option>
          <option value="gen_metro">일반고 · 수도권</option>
          <option value="gen_local">일반고 · 지방</option>
          <option value="autonomous">자사고</option>
          <option value="special_lang">특목고 · 외고/국제고</option>
          <option value="special_sci">특목고 · 과학고/영재고</option>
          <option value="arts">예술·체육고</option>
        </select>
      </div>
      <div class="input-group">
        <label>MBTI</label>
        <select id="mbtiInput">
          <option value="">선택</option>
          <option>ISTJ</option><option>ISFJ</option><option>INFJ</option><option>INTJ</option>
          <option>ISTP</option><option>ISFP</option><option>INFP</option><option>INTP</option>
          <option>ESTP</option><option>ESFP</option><option>ENFP</option><option>ENTP</option>
          <option>ESTJ</option><option>ESFJ</option><option>ENFJ</option><option>ENTJ</option>
        </select>
      </div>
    </div>
    <div class="input-row" style="margin-top:12px;">
      <div class="input-group">
        <label>주말 기상 (선택)</label>
        <select id="cWake"><option value="">—</option><option value="1">일찍 (7시 전)</option><option value="0">보통 (7~9시)</option><option value="-1">늦게 (9시 후)</option></select>
      </div>
      <div class="input-group">
        <label>집중 잘 되는 때 (선택)</label>
        <select id="cFocus"><option value="">—</option><option value="1">오전</option><option value="0">오후</option><option value="-1">밤</option></select>
      </div>
      <div class="input-group">
        <label>저녁 졸음 (선택)</label>
        <select id="cSleepy"><option value="">—</option><option value="1">일찍 잠</option><option value="0">보통</option><option value="-1">늦게까지</option></select>
      </div>
      <button class="add-btn" id="analyzeBtn">분석하기</button>
    </div>
    <div id="analysisResult" class="analysis-result" style="display:none;"></div>
  </div>

  <div class="legend">
    <div class="legend-item"><div class="legend-dot" style="background:#E53935"></div> 학교 성적</div>
    <div class="legend-item"><div class="legend-dot" style="background:#1E88E5"></div> 모의고사</div>
  </div>

  <div class="stats" id="statsArea"></div>

  <div class="charts-grid" id="chartsGrid"></div>

  <div class="table-section">
    <h3>기록 목록</h3>
    <div class="table-wrap">
      <table>
        <thead id="gradeHead"></thead>
        <tbody id="gradeBody"></tbody>
      </table>
    </div>
    <div class="empty-msg" id="emptyMsg">아직 입력된 성적이 없어요. 위에서 성적을 추가하거나 파일/사진을 올려보세요!</div>
  </div>
</div>

<div id="savedIndicator" class="saved-indicator">저장됨</div>

<!-- 모달 -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal" id="modalContent"></div>
</div>

<script>
  const STORAGE_KEY = 'grade-data';
  const SUBJECTS_KEY = 'grade-subjects';
  const DEFAULT_SUBJECTS = ['국어', '영어', '수학'];

  let grades = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');

  // ---- 마이그레이션: 옛 구조(korean/english/math) -> scores 맵 ----
  grades.forEach(g => {
    if (!g.type) g.type = 'school';
    if (!g.scores) {
      g.scores = {};
      if (g.korean !== undefined && g.korean !== null) g.scores['국어'] = g.korean;
      if (g.english !== undefined && g.english !== null) g.scores['영어'] = g.english;
      if (g.math !== undefined && g.math !== null) g.scores['수학'] = g.math;
      delete g.korean; delete g.english; delete g.math;
    }
  });

  // ---- 과목 목록(동적) ----
  let subjectList = JSON.parse(localStorage.getItem(SUBJECTS_KEY) || 'null') || DEFAULT_SUBJECTS.slice();
  function syncSubjectsFromData() {
    grades.forEach(g => Object.keys(g.scores).forEach(s => {
      if (!subjectList.includes(s)) subjectList.push(s);
    }));
  }
  syncSubjectsFromData();

  // ---- DOM 참조 ----
  const typeInput = document.getElementById('inputType');
  const dateInput = document.getElementById('inputDate');
  const examInput = document.getElementById('inputExam');
  const subjectInputs = document.getElementById('subjectInputs');
  const addBtn = document.getElementById('addBtn');
  const addSubjectBtn = document.getElementById('addSubjectBtn');
  const gradeBody = document.getElementById('gradeBody');
  const gradeHead = document.getElementById('gradeHead');
  const emptyMsg = document.getElementById('emptyMsg');
  const statsArea = document.getElementById('statsArea');
  const chartsGrid = document.getElementById('chartsGrid');
  const modalOverlay = document.getElementById('modalOverlay');
  const modalContent = document.getElementById('modalContent');

  dateInput.value = new Date().toISOString().split('T')[0];

  let charts = {};

  // ---- 저장 ----
  function save() {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(grades));
    localStorage.setItem(SUBJECTS_KEY, JSON.stringify(subjectList));
    showSaved();
  }
  function showSaved() {
    const ind = document.getElementById('savedIndicator');
    ind.classList.add('show');
    setTimeout(() => ind.classList.remove('show'), 1500);
  }

  // ---- 숫자 파서 ----
  function num(v) {
    if (v === undefined || v === null) return null;
    const c = String(v).replace(/[^0-9.\-]/g, '');
    if (c === '') return null;
    const n = Number(c);
    return isFinite(n) ? n : null;
  }
  function round1(n) { return Math.round(n * 10) / 10; }

  function calcAvg(g) {
    const vals = Object.values(g.scores).filter(v => v !== null && v !== undefined && !isNaN(v));
    if (vals.length === 0) return null;
    return round1(vals.reduce((a, b) => a + b, 0) / vals.length);
  }

  // ---- 입력 폼: 과목 점수칸 동적 생성 ----
  function renderSubjectInputs() {
    subjectInputs.innerHTML = '';
    subjectList.forEach(subj => {
      const g = document.createElement('div');
      g.className = 'input-group subj-input-wrap';
      g.innerHTML = `
        <label>${subj}</label>
        <input type="number" min="0" max="100" placeholder="점수" data-subject="${subj}">
        <button class="subj-remove" type="button" title="이 과목 칸 숨기기">×</button>
      `;
      g.querySelector('.subj-remove').addEventListener('click', () => removeSubject(subj));
      subjectInputs.appendChild(g);
    });
  }

  function addSubject() {
    const name = (prompt('추가할 과목 이름을 입력하세요 (예: 과학, 사회, 한국사)') || '').trim();
    if (!name) return;
    if (subjectList.includes(name)) { alert('이미 있는 과목입니다.'); return; }
    subjectList.push(name);
    save();
    renderSubjectInputs();
    renderAll();
  }

  // 데이터에 점수가 있는 과목은 목록에서 못 빼게 막음(데이터 보호)
  function removeSubject(subj) {
    const used = grades.some(g => g.scores[subj] !== undefined && g.scores[subj] !== null);
    if (used) { alert('이 과목은 기록에 점수가 있어 숨길 수 없어요. (기록을 먼저 수정/삭제하세요)'); return; }
    subjectList = subjectList.filter(s => s !== subj);
    save();
    renderSubjectInputs();
    renderAll();
  }

  addSubjectBtn.addEventListener('click', addSubject);

  // ---- 직접 입력 추가 ----
  addBtn.addEventListener('click', () => {
    const type = typeInput.value;
    const date = dateInput.value;
    const exam = examInput.value.trim();

    if (!date || !exam) { alert('날짜와 시험 이름을 입력하세요.'); return; }

    const scores = {};
    subjectInputs.querySelectorAll('input[data-subject]').forEach(inp => {
      const n = num(inp.value);
      if (n !== null) scores[inp.dataset.subject] = n;
    });

    if (Object.keys(scores).length === 0) { alert('과목 점수를 하나 이상 입력하세요.'); return; }

    grades.push({ type, date, exam, scores });
    grades.sort((a, b) => (a.date || '').localeCompare(b.date || ''));
    save();
    renderAll();

    examInput.value = '';
    subjectInputs.querySelectorAll('input[data-subject]').forEach(inp => inp.value = '');
  });

  // ---- 삭제 / 수정 ----
  function deleteGrade(idx) {
    if (confirm('이 기록을 삭제할까요?')) {
      grades.splice(idx, 1);
      save();
      renderAll();
    }
  }

  function editGrade(idx) {
    const g = grades[idx];
    const tr = gradeBody.children[idx];
    tr.classList.add('editing');
    const subjCells = subjectList.map(s =>
      `<td><input type="number" min="0" max="100" data-subject="${s}" value="${g.scores[s] !== undefined && g.scores[s] !== null ? g.scores[s] : ''}"></td>`
    ).join('');
    tr.innerHTML = `
      <td><select><option value="school" ${g.type==='school'?'selected':''}>학교</option><option value="mock" ${g.type==='mock'?'selected':''}>모의고사</option></select></td>
      <td><input type="date" value="${g.date || ''}"></td>
      <td><input type="text" value="${g.exam || ''}"></td>
      ${subjCells}
      <td></td>
      <td>
        <button class="action-btn" onclick="saveEdit(${idx})">저장</button>
        <button class="action-btn del" onclick="renderAll()">취소</button>
      </td>
    `;
  }

  function saveEdit(idx) {
    const tr = gradeBody.children[idx];
    const type = tr.querySelector('select').value;
    const date = tr.querySelector('input[type="date"]').value;
    const exam = tr.querySelector('input[type="text"]').value.trim();
    if (!date || !exam) { alert('날짜와 시험 이름을 입력하세요.'); return; }

    const scores = {};
    tr.querySelectorAll('input[data-subject]').forEach(inp => {
      const n = num(inp.value);
      if (n !== null) scores[inp.dataset.subject] = n;
    });

    grades[idx] = { type, date, exam, scores };
    grades.sort((a, b) => (a.date || '').localeCompare(b.date || ''));
    save();
    renderAll();
  }

  // ---- 렌더링 ----
  function renderAll() {
    renderHead();
    renderTable();
    renderStats();
    renderCharts();
  }

  function renderHead() {
    const subjTh = subjectList.map(s => `<th>${s}</th>`).join('');
    gradeHead.innerHTML = `<tr><th>구분</th><th>날짜</th><th>시험</th>${subjTh}<th>평균</th><th></th></tr>`;
  }

  function renderTable() {
    gradeBody.innerHTML = '';
    emptyMsg.style.display = grades.length === 0 ? 'block' : 'none';

    grades.forEach((g, i) => {
      const avg = calcAvg(g);
      const tag = g.type === 'school'
        ? '<span class="tag-school">학교</span>'
        : '<span class="tag-mock">모의</span>';
      const subjTd = subjectList.map(s => {
        const v = g.scores[s];
        return `<td>${v !== undefined && v !== null ? v : '-'}</td>`;
      }).join('');
      const tr = document.createElement('tr');
      tr.innerHTML = `
        <td>${tag}</td>
        <td>${g.date || '-'}</td>
        <td>${g.exam || '-'}</td>
        ${subjTd}
        <td><strong>${avg !== null ? avg : '-'}</strong></td>
        <td>
          <button class="action-btn" onclick="editGrade(${i})">수정</button>
          <button class="action-btn del" onclick="deleteGrade(${i})">삭제</button>
        </td>
      `;
      gradeBody.appendChild(tr);
    });
  }

  function renderStats() {
    if (grades.length === 0) { statsArea.innerHTML = ''; return; }

    statsArea.innerHTML = subjectList.map(subj => {
      const schoolScores = grades.filter(g => g.type === 'school').map(g => g.scores[subj]).filter(s => s !== undefined && s !== null);
      const mockScores = grades.filter(g => g.type === 'mock').map(g => g.scores[subj]).filter(s => s !== undefined && s !== null);

      function statHtml(scores, cls, label) {
        if (scores.length === 0) return `<div class="score-col"><div class="type ${cls}">${label}</div><div class="avg" style="font-size:14px;color:#999">-</div></div>`;
        const avg = round1(scores.reduce((a, b) => a + b, 0) / scores.length);
        const max = Math.max(...scores);
        const min = Math.min(...scores);
        return `<div class="score-col"><div class="type ${cls}">${label}</div><div class="avg ${cls}">${avg}</div><div class="detail">최고${max} 최저${min}</div></div>`;
      }

      if (schoolScores.length === 0 && mockScores.length === 0) return '';

      return `
        <div class="stat-card">
          <div class="subject">${subj}</div>
          <div class="scores">
            ${statHtml(schoolScores, 'type-school', '학교')}
            ${statHtml(mockScores, 'type-mock', '모의')}
          </div>
        </div>
      `;
    }).join('');
  }

  function renderCharts() {
    Object.values(charts).forEach(c => c.destroy());
    charts = {};
    chartsGrid.innerHTML = '';

    if (grades.length === 0) return;

    subjectList.forEach(subj => {
      const schoolData = grades.filter(g => g.type === 'school' && g.scores[subj] !== undefined && g.scores[subj] !== null);
      const mockData = grades.filter(g => g.type === 'mock' && g.scores[subj] !== undefined && g.scores[subj] !== null);
      if (schoolData.length === 0 && mockData.length === 0) return;

      const box = document.createElement('div');
      box.className = 'chart-box';
      const canvasId = 'chart_' + subj.replace(/[^a-zA-Z0-9가-힣]/g, '_');
      box.innerHTML = `<h3>${subj}</h3><canvas id="${canvasId}"></canvas>`;
      chartsGrid.appendChild(box);

      const allLabels = [...new Set([...schoolData, ...mockData].map(g => g.date))].sort();
      const schoolPoints = allLabels.map(d => { const f = schoolData.find(g => g.date === d); return f ? f.scores[subj] : null; });
      const mockPoints = allLabels.map(d => { const f = mockData.find(g => g.date === d); return f ? f.scores[subj] : null; });

      const ctx = document.getElementById(canvasId).getContext('2d');
      charts[subj] = new Chart(ctx, {
        type: 'line',
        data: {
          labels: allLabels,
          datasets: [
            { label: '학교', data: schoolPoints, borderColor: '#E53935', backgroundColor: 'rgba(229,57,53,0.08)', borderWidth: 2.5, pointRadius: 5, pointBackgroundColor: '#E53935', tension: 0.3, spanGaps: true },
            { label: '모의고사', data: mockPoints, borderColor: '#1E88E5', backgroundColor: 'rgba(30,136,229,0.08)', borderWidth: 2.5, pointRadius: 5, pointBackgroundColor: '#1E88E5', tension: 0.3, spanGaps: true }
          ]
        },
        options: {
          responsive: true,
          plugins: { legend: { display: false } },
          scales: { y: { min: 0, max: 100, ticks: { stepSize: 20 } }, x: { ticks: { font: { size: 10 } } } }
        }
      });
    });
  }

  // ================= 엑셀/CSV 업로드 =================
  const FIELD_KEYWORDS = {
    subject: ['과목', 'subject', '교과', '과목명'],
    score: ['점수', 'score', '점', '성적', '득점', '원점수'],
    exam: ['시험', 'exam', '시험명', '평가', '회차'],
    date: ['날짜', 'date', '일자', '학기', '시기', '연도', '년월'],
    type: ['구분', '종류', 'type', '유형'],
    fullMarks: ['만점', 'full', 'total', '배점']
  };

  function normalizeKey(s) { return String(s).replace(/\s+/g, '').toLowerCase(); }

  function autoMap(headers) {
    const mapping = { subject: null, score: null, exam: null, date: null, type: null, fullMarks: null };
    const used = new Set();
    Object.keys(FIELD_KEYWORDS).forEach(field => {
      const kws = FIELD_KEYWORDS[field];
      let best = null;
      for (const h of headers) { if (used.has(h)) continue; if (kws.some(k => normalizeKey(h) === normalizeKey(k))) { best = h; break; } }
      if (!best) { for (const h of headers) { if (used.has(h)) continue; if (kws.some(k => normalizeKey(h).includes(normalizeKey(k)))) { best = h; break; } } }
      if (best) { mapping[field] = best; used.add(best); }
    });
    return mapping;
  }

  function parseSheet(wb) {
    const first = wb.SheetNames[0];
    if (!first) return { headers: [], rows: [] };
    const matrix = XLSX.utils.sheet_to_json(wb.Sheets[first], { header: 1, blankrows: false, defval: '' });
    if (matrix.length === 0) return { headers: [], rows: [] };
    // 엑셀 날짜셀(Date 객체)은 YYYY-MM-DD 문자열로 변환
    const cellStr = v => {
      if (v === undefined || v === null) return '';
      if (v instanceof Date) return v.toISOString().slice(0, 10);
      return String(v).trim();
    };
    const headers = matrix[0].map((h, i) => cellStr(h) || ('열' + (i + 1)));
    const rows = [];
    for (let r = 1; r < matrix.length; r++) {
      const obj = {}; let has = false;
      headers.forEach((h, c) => { const s = cellStr(matrix[r][c]); if (s !== '') has = true; obj[h] = s; });
      if (has) rows.push(obj);
    }
    return { headers, rows };
  }

  // 행(과목·점수) 데이터를 (구분,날짜,시험)별로 묶어 exam 레코드로 변환
  function rowsToExamRecords(sheet, mapping) {
    const groupMap = new Map();
    sheet.rows.forEach(row => {
      const subject = mapping.subject ? (row[mapping.subject] || '').trim() : '';
      let score = mapping.score ? num(row[mapping.score]) : null;
      if (!subject || score === null) return;
      if (mapping.fullMarks) { const fm = num(row[mapping.fullMarks]); if (fm && fm > 0) score = round1(score / fm * 100); }
      let type = 'school';
      if (mapping.type) { const tv = (row[mapping.type] || ''); if (/모의|mock|수능|평가원|교육청/i.test(tv)) type = 'mock'; }
      const date = mapping.date ? (row[mapping.date] || '').trim() : '';
      const exam = mapping.exam ? (row[mapping.exam] || '').trim() : '가져온 성적';
      const key = type + '|' + date + '|' + exam;
      if (!groupMap.has(key)) groupMap.set(key, { type, date, exam: exam || '가져온 성적', scores: {} });
      groupMap.get(key).scores[subject] = score;
    });
    return [...groupMap.values()];
  }

  async function handleFiles(fileList) {
    const files = Array.from(fileList || []);
    if (files.length === 0) return;
    let imported = [];
    let newSubjects = new Set();
    for (const file of files) {
      try {
        let wb;
        const name = (file.name || '').toLowerCase();
        if (name.endsWith('.csv') || file.type === 'text/csv') {
          let txt = await file.text();
          if (txt.charCodeAt(0) === 0xFEFF) txt = txt.slice(1); // BOM 제거
          wb = XLSX.read(txt, { type: 'string', raw: true });
        } else {
          const buf = await file.arrayBuffer();
          wb = XLSX.read(buf, { type: 'array', cellDates: true });
        }
        const sheet = parseSheet(wb);
        const mapping = autoMap(sheet.headers);
        if (!mapping.subject || !mapping.score) {
          alert(`"${file.name}": 과목/점수 열을 찾지 못했어요. 첫 줄에 '과목', '점수' 머리글이 있는지 확인하세요.`);
          continue;
        }
        const recs = rowsToExamRecords(sheet, mapping);
        recs.forEach(r => { imported.push(r); Object.keys(r.scores).forEach(s => newSubjects.add(s)); });
      } catch (e) {
        alert(`"${file.name}" 파일을 읽는 중 오류가 발생했어요. 엑셀(.xlsx) 또는 CSV인지 확인하세요.`);
      }
    }
    if (imported.length === 0) { alert('가져올 성적을 찾지 못했어요.'); return; }
    showImportPreview(imported, newSubjects);
  }

  function showImportPreview(imported, newSubjects) {
    const subjCols = [...new Set(imported.flatMap(r => Object.keys(r.scores)))];
    const rowsHtml = imported.map(r => {
      const tag = r.type === 'school' ? '<span class="tag-school">학교</span>' : '<span class="tag-mock">모의</span>';
      const cells = subjCols.map(s => `<td>${r.scores[s] !== undefined ? r.scores[s] : '-'}</td>`).join('');
      return `<tr><td>${tag}</td><td>${r.date || '-'}</td><td>${r.exam}</td>${cells}</tr>`;
    }).join('');
    modalContent.innerHTML = `
      <h3>가져오기 미리보기</h3>
      <p class="sub">${imported.length}개 시험 · ${subjCols.length}과목을 인식했어요. 추가할까요?</p>
      <div class="table-wrap"><table>
        <thead><tr><th>구분</th><th>날짜</th><th>시험</th>${subjCols.map(s=>`<th>${s}</th>`).join('')}</tr></thead>
        <tbody>${rowsHtml}</tbody>
      </table></div>
      <div class="modal-actions">
        <button class="action-btn" id="importCancel">취소</button>
        <button class="add-btn" id="importConfirm">${imported.length}개 추가</button>
      </div>
    `;
    openModal();
    document.getElementById('importCancel').onclick = closeModal;
    document.getElementById('importConfirm').onclick = () => {
      newSubjects.forEach(s => { if (!subjectList.includes(s)) subjectList.push(s); });
      grades = grades.concat(imported);
      grades.sort((a, b) => (a.date || '').localeCompare(b.date || ''));
      save();
      renderSubjectInputs();
      renderAll();
      closeModal();
    };
  }

  // ================= 사진 OCR =================
  async function handleOcr(file) {
    if (!file) return;
    modalContent.innerHTML = `
      <h3>사진에서 성적 읽는 중…</h3>
      <p class="sub">잠시만 기다려 주세요. (한글 인식은 시간이 조금 걸릴 수 있어요)</p>
      <div class="ocr-progress" id="ocrProgress">준비 중… 0%</div>
    `;
    openModal();
    const prog = document.getElementById('ocrProgress');
    try {
      const { data } = await Tesseract.recognize(file, 'kor', {
        logger: m => { if (m.status === 'recognizing text' && prog) prog.textContent = `글자 인식 중… ${Math.round(m.progress * 100)}%`; }
      });
      const pairs = parseOcrText(data.text || '');
      showOcrEditor(pairs, data.text || '');
    } catch (e) {
      modalContent.innerHTML = `<h3>인식 실패</h3><p class="sub">사진에서 글자를 읽지 못했어요. 더 선명한 사진으로 다시 시도하거나, 직접 입력해 주세요.</p><div class="modal-actions"><button class="action-btn" onclick="closeModal()">닫기</button></div>`;
    }
  }

  // "과목명 ... 숫자(0~100)" 패턴 추출
  function parseOcrText(text) {
    const pairs = [];
    text.split(/\r?\n/).forEach(line => {
      const m = line.match(/([가-힣A-Za-z]{2,10})\D*?(\d{1,3})(?:\D|$)/);
      if (m) {
        const name = m[1].trim();
        const score = parseInt(m[2], 10);
        if (score >= 0 && score <= 100 && name.length >= 1) pairs.push({ subject: name, score });
      }
    });
    return pairs;
  }

  function showOcrEditor(pairs, rawText) {
    const today = new Date().toISOString().split('T')[0];
    function rowHtml(p) {
      return `<tr>
        <td><input type="text" class="ocr-subj" value="${(p && p.subject) ? p.subject.replace(/"/g,'') : ''}" placeholder="과목"></td>
        <td><input type="number" class="ocr-score" min="0" max="100" value="${(p && p.score!==undefined) ? p.score : ''}" placeholder="점수"></td>
        <td><button class="action-btn del" onclick="this.closest('tr').remove()">삭제</button></td>
      </tr>`;
    }
    const initRows = (pairs.length ? pairs : [null, null, null]).map(rowHtml).join('');
    modalContent.innerHTML = `
      <h3>인식 결과 확인 · 수정</h3>
      <p class="sub">자동 인식 결과예요. 틀린 부분을 고치고 빠진 과목은 추가한 뒤 저장하세요.</p>
      <div class="meta-row">
        <div class="input-group"><label>구분</label>
          <select id="ocrType"><option value="school">🏫 학교 성적</option><option value="mock">📝 모의고사</option></select></div>
        <div class="input-group"><label>날짜</label><input type="date" id="ocrDate" value="${today}"></div>
        <div class="input-group"><label>시험 이름</label><input type="text" id="ocrExam" placeholder="예: 중간고사"></div>
      </div>
      <div class="table-wrap"><table>
        <thead><tr><th>과목</th><th>점수</th><th></th></tr></thead>
        <tbody id="ocrRows">${initRows}</tbody>
      </table></div>
      <button class="ghost-btn" id="ocrAddRow" style="margin-top:10px;">+ 줄 추가</button>
      <details style="margin-top:12px;"><summary style="cursor:pointer;color:var(--text-sub);font-size:12px;">원본 인식 텍스트 보기</summary>
        <pre style="white-space:pre-wrap;font-size:12px;background:var(--surface-soft);padding:10px;border-radius:8px;">${(rawText||'').replace(/</g,'&lt;')}</pre></details>
      <div class="modal-actions">
        <button class="action-btn" id="ocrCancel">취소</button>
        <button class="add-btn" id="ocrSave">성적 추가</button>
      </div>
    `;
    openModal();
    document.getElementById('ocrAddRow').onclick = () => {
      const tb = document.getElementById('ocrRows');
      const tr = document.createElement('tr');
      tr.innerHTML = rowHtml(null);
      tb.appendChild(tr);
    };
    document.getElementById('ocrCancel').onclick = closeModal;
    document.getElementById('ocrSave').onclick = () => {
      const type = document.getElementById('ocrType').value;
      const date = document.getElementById('ocrDate').value;
      const exam = document.getElementById('ocrExam').value.trim();
      if (!date || !exam) { alert('날짜와 시험 이름을 입력하세요.'); return; }
      const scores = {};
      const newSubs = [];
      document.querySelectorAll('#ocrRows tr').forEach(tr => {
        const subj = tr.querySelector('.ocr-subj').value.trim();
        const sc = num(tr.querySelector('.ocr-score').value);
        if (subj && sc !== null) { scores[subj] = sc; if (!subjectList.includes(subj)) newSubs.push(subj); }
      });
      if (Object.keys(scores).length === 0) { alert('과목과 점수를 하나 이상 입력하세요.'); return; }
      newSubs.forEach(s => subjectList.push(s));
      grades.push({ type, date, exam, scores });
      grades.sort((a, b) => (a.date || '').localeCompare(b.date || ''));
      save();
      renderSubjectInputs();
      renderAll();
      closeModal();
    };
  }

  // ================= 모달 헬퍼 =================
  function openModal() { modalOverlay.classList.add('show'); }

  function statOf(subj){
    const recs = grades.filter(g=>g.scores[subj]!==undefined && g.scores[subj]!==null)
      .map(g=>({date:g.date||'', type:g.type, v:Number(g.scores[subj])}))
      .filter(r=>!isNaN(r.v)).sort((a,b)=>a.date.localeCompare(b.date));
    if(!recs.length) return null;
    const vals = recs.map(r=>r.v);
    const mean = arr => round1(arr.reduce((a,b)=>a+b,0)/arr.length);
    const school = recs.filter(r=>r.type==='school').map(r=>r.v);
    const mock = recs.filter(r=>r.type==='mock').map(r=>r.v);
    return {
      subj, avg: mean(vals), n: recs.length,
      sAvg: school.length? mean(school): null,
      mAvg: mock.length? mean(mock): null,
      trend: recs.length>=2 ? round1(recs[recs.length-1].v - recs[0].v) : 0
    };
  }

  function ageFrom(dob){

    const m = t.getMonth() - b.getMonth();
    if(m < 0 || (m === 0 && t.getDate() < b.getDate())) a--;
    return (a >= 0 && a < 120) ? a : null;
  }

  const HS_TYPE = {

  function jdn(y,m,d){const a=Math.floor((14-m)/12),yy=y+4800-a,mm=m+12*a-3;return d+Math.floor((153*mm+2)/5)+365*yy+Math.floor(yy/4)-Math.floor(yy/100)+Math.floor(yy/400)-32045;}
  function dayPillar(Y,M,D){const i=((jdn(Y,M,D)+49)%60+60)%60;return {stem:i%10,branch:i%12};}
  function yearPillar(Y,M,D){let y=Y; if(M===1||(M===2&&D<4)) y=Y-1; return {stem:((y-4)%10+10)%10,branch:((y-4)%12+12)%12};}
  function monthBranch(M,D){const thr={1:6,2:4,3:6,4:5,5:6,6:6,7:7,8:8,9:8,10:8,11:7,12:7};return D<thr[M]?(M%12+11)%12:M%12;}
  function monthStem(yStem,mBr){const base=[2,4,6,8,0][yStem%5];return (base+(((mBr-2)+12)%12))%10;}
  function hourPillar(dStem,h){const br=Math.floor((h+1)/2)%12;const base=[0,2,4,6,8][dStem%5];return {stem:(base+br)%10,branch:br};}
  function buildPillars(Y,M,D,h){
    const yp=yearPillar(Y,M,D);
    const mBr=monthBranch(M,D); const mp={stem:monthStem(yp.stem,mBr),branch:mBr};
    const dp=dayPillar(Y,M,D);
    const list=[yp,mp,dp];
    if(h!==null&&h!==undefined&&h!=='') list.push(hourPillar(dp.stem,parseInt(h)));
    return {yp,mp,dp,list};
  }
  function collectEl(list){const c={목:0,화:0,토:0,금:0,수:0};list.forEach(p=>{c[STEM_EL[p.stem]]++;c[BRANCH_EL[p.branch]]++;});return c;}
  function ohaengStr(c){return `목${c.목}·화${c.화}·토${c.토}·금${c.금}·수${c.수}`;}
  const clamp=(v,a,b)=>Math.max(a,Math.min(b,v));

  function gradeSignal(stats){
    if(!stats.length) return null;
    const sci=stats.filter(s=>categoryOf(s.subj)==='sci');
    const hum=stats.filter(s=>categoryOf(s.subj)==='hum');
    const avgA=a=>a.length?round1(a.reduce((x,y)=>x+y.avg,0)/a.length):null;
    const avgV=key=>{const v=stats.map(s=>s[key]).filter(x=>x!=null);return v.length?round1(v.reduce((a,b)=>a+b,0)/v.length):null;};
    const sciA=avgA(sci), humA=avgA(hum), schoolAvg=avgV('sAvg'), mockAvg=avgV('mAvg');
    const rising=stats.filter(s=>s.trend>=3).length;
    return {
      sciA,humA,schoolAvg,mockAvg,rising,n:stats.length,
      sci: sciA!=null?clamp(sciA-65,-18,26):0,
      hum: humA!=null?clamp(humA-65,-18,26):0,
      diligence:((schoolAvg!=null&&mockAvg!=null)?clamp(schoolAvg-mockAvg,-10,12):0)+rising*3
    };
  }
  function resolveLevel(age){
    const v=levelInput.value;
    if(v==='elem'||v==='mid'||v==='high') return v;
    if(age==null) return 'mid';

    if(age<=15) return 'mid';
    return 'high';
  }
  function tendencyScores(c,mbti,g,w){
    const tot=Object.values(c).reduce((a,b)=>a+b,0)||1; const p=k=>c[k]/tot;
    const s={
      수리:p('금')*1.0+p('수')*0.55+p('토')*0.3,
      문해:p('목')*1.0+p('수')*0.8+p('화')*0.3,
      집중:p('토')*1.0+p('금')*0.6+p('수')*0.2,
      창의:p('화')*1.0+p('목')*0.7,
      성실:p('토')*0.95+p('금')*0.7
    };
    for(const k in s) s[k]=32+s[k]*78;
    if(mbti&&mbti.length===4){const t=mbti.toUpperCase();
      if(t[0]==='I')s.집중+=5; else s.창의+=4;
      if(t[1]==='N'){s.창의+=5;s.문해+=3;} else {s.성실+=5;s.수리+=3;}
      if(t[2]==='T'){s.수리+=6;s.집중+=3;} else s.문해+=5;
      if(t[3]==='J'){s.집중+=5;s.성실+=6;} else {s.창의+=4;s.집중-=3;}
    }
    if(g){ s.수리+=g.sci*w; s.문해+=g.hum*w; s.집중+=g.diligence*w; s.성실+=g.diligence*w; }
    for(const k in s) s[k]=clamp(Math.round(s[k]),28,94);
    return s;
  }
  function dayNight(c,dStem,mbti,chrono){
    let m=(c.화+c.목), n=(c.수+c.금);
    if(STEM_YANG[dStem]) m+=1.3; else n+=1.3;
    if(mbti&&mbti.length===4){const t=mbti.toUpperCase();
      if(t[3]==='J')m+=1.5; else n+=1.2;
      if(t[1]==='S')m+=1; else n+=1;}
    const base=(m-n)/((m+n)||1); // -1..1 (양수=아침형)
    let score=base, blended=false;
    if(chrono&&chrono.length){
      const cs=chrono.reduce((a,b)=>a+b,0)/chrono.length;
      score=base*0.65+cs*0.35; blended=true;
    }
    const isM=score>=0, near=Math.abs(score)<0.12;
    let desc=near?'아침·저녁 차이가 크지 않은 균형형이라, 무엇보다 규칙적인 수면 리듬을 지키는 것이 중요해요.'
      :isM?'오전~낮에 집중력이 가장 좋은 편이라, 어려운 과목을 오전에 배치하면 효율이 높아요.'
           :'저녁~밤에 몰입이 잘 되는 편이라, 핵심 공부를 늦은 오후 이후로 두면 효과적이에요.';
    if(blended) desc+=' (실제 생활 패턴까지 반영한 결과예요.)';
    return {isM,near,blended,label:near?'균형형':(isM?'아침형':'밤형'),desc};
  }

  function analyzeEngine(){
    const dob=dobInput.value;
    if(!dob) return {error:'생년월일을 먼저 입력하면 사주·MBTI 기반 성향 분석을 시작합니다.'};
    const [Y,M,D]=dob.split('-').map(Number);
    const pil=buildPillars(Y,M,D,birthTimeInput.value);
    const cnt=collectEl(pil.list);
    const mbti=mbtiInput.value;
    const stats=subjectList.map(statOf).filter(Boolean);
    const gsig=gradeSignal(stats);
    const age=ageFrom(dob);
    const level=resolveLevel(age);
    const w=({elem:0.12,mid:0.35,high:0.55})[level]||0.2;
    const scores=tendencyScores(cnt,mbti,gsig,w);
    const chrono=[cWake.value,cFocus.value,cSleepy.value].filter(v=>v!=='').map(Number);
    return {dp:pil.dp,cnt,mbti,stats,gsig,age,level,scores,
      dayMasterEl:STEM_EL[pil.dp.stem], dn:dayNight(cnt,pil.dp.stem,mbti,chrono), hsType:hsTypeInput.value};

  function buildSummary(r){
    const NM={수리:'수리·논리력',문해:'문해·언어력',집중:'집중 지속력',창의:'창의·표현력',성실:'성실·자기관리'};
    const ord=Object.entries(r.scores).sort((a,b)=>b[1]-a[1]);
    const t1=NM[ord[0][0]], t2=NM[ord[1][0]], low=NM[ord[ord.length-1][0]];
    const elTop=Object.entries(r.cnt).sort((a,b)=>b[1]-a[1])[0][0];
    const P=[];
    P.push(`사주로 보면 일간이 ${STEMS[r.dp.stem]}${BRANCHES[r.dp.branch]}(${EL_NAME[r.dayMasterEl]}) 기운이라 ${EL_TRAIT[r.dayMasterEl]}이(가) 바탕이 되는 아이입니다.`);
    P.push(`오행 중 ${EL_NAME[elTop]} 기운이 가장 두드러져 ${t1}과(와) ${t2}에서 강점이 보입니다.`);
    if(r.level==='elem'){
      P.push(`초등 시기에는 성적 데이터가 아직 얕아 점수보다 타고난 기질이 더 정확합니다. 강점인 ${t1}은(는) 칭찬으로 키우고, ${low}은(는) 독서·놀이처럼 부담 없이 접근하면 효과적입니다.`);
    } else if(r.level==='mid'){
      P.push(`중등은 기질과 내신이 함께 쌓이는 단계라, ${t1} 강점을 살리되 ${low}을(를) 시험 범위 안에서 꾸준히 보강하면 성적이 안정됩니다.`);
    } else {
      let d='';
      if(r.gsig&&r.gsig.schoolAvg!=null&&r.gsig.mockAvg!=null){
        d=r.gsig.schoolAvg-r.gsig.mockAvg>=4?' 내신이 모의고사보다 높아 수시(학생부) 전형이 유리하고,'
          :r.gsig.mockAvg-r.gsig.schoolAvg>=4?' 모의고사가 내신보다 높아 정시(수능) 전형에 강점이 있고,'
          :' 내신과 모의고사가 비슷해 수시·정시를 함께 준비할 수 있고,';
      }
      let gye='';
      if(r.gsig&&r.gsig.sciA!=null&&r.gsig.humA!=null){
        gye=r.gsig.sciA-r.gsig.humA>=3?' 수리·과학이 강해 이과 계열이 잘 맞습니다.'
           :r.gsig.humA-r.gsig.sciA>=3?' 어문·사회가 강해 문과 계열이 잘 맞습니다.':' 문·이과가 고른 편입니다.';
      }
      const ht=(r.hsType&&HS_TYPE[r.hsType])?` ${HS_TYPE[r.hsType].name} 기준, ${HS_TYPE[r.hsType].dae}`
        :(r.gsig?'':' 성적을 입력하면 수시·정시 적합도까지 더 정확히 분석해 드립니다.');
      P.push(`고등은 대입을 염두에 둔 분석이 필요합니다.${d}${gye}${ht}`);
    }
    if(r.mbti&&r.mbti.length===4) P.push(`MBTI ${r.mbti}는 ${mbtiOneLine(r.mbti)} ${mbtiStudyTip(r.mbti)}`);
    P.push(`종합하면 ${t1}을(를) 무기로 삼고 ${low}은(는) 작은 목표로 나눠 채우는 것이 가장 빠른 성장 경로입니다.`);
    return P.join(' ');
  }
  function buildTips(r){
    const t=[]; const mb=(r.mbti&&r.mbti.length===4)?r.mbti.toUpperCase():'';
    if(mb&&mb[3]==='P') t.push('하루 목표를 3개 이내 체크리스트로 쪼개 미루기를 막아 보세요.');
    else if(mb&&mb[3]==='J') t.push('주간 계획표를 미리 짜고 끝까지 지키는 강점을 활용하세요.');
    else t.push('하루 할 일을 3개로 정해 작게 시작해 보세요.');
    if(r.level==='high'&&r.hsType&&HS_TYPE[r.hsType]) t.push(HS_TYPE[r.hsType].tip);
    else if(r.scores.집중<58) t.push('한 번에 25분 집중 + 5분 휴식(뽀모도로)으로 앉아있는 힘을 키워 보세요.');
    else t.push(`집중 지속력이 좋은 편이라 ${r.dn.isM?'오전':'저녁'} 시간에 어려운 과목을 몰아서 공부하면 효과적이에요.`);
    return t;
  }

  function renderResult(){
    const r=analyzeEngine();
    analysisResult.style.display='block';
    if(r.error){ analysisResult.innerHTML=`<h4 style="margin:0 0 8px;color:var(--accent-dark);">📋 분석</h4><div class="an">${r.error}</div>`; analysisResult.scrollIntoView({behavior:'smooth',block:'nearest'}); return; }
    const NM={수리:'수리·논리력',문해:'문해·언어력',집중:'집중 지속력',창의:'창의·표현력',성실:'성실·자기관리'};
    const order=['수리','문해','집중','창의','성실'];
    const bars=order.map(k=>`<div class="bar-row"><div class="lab"><span>${NM[k]}</span><span class="sc">${r.scores[k]}</span></div><div class="bar-track"><div class="bar-fill" style="width:${r.scores[k]}%"></div></div></div>`).join('');
    const lv={elem:'초등',mid:'중등',high:'고등'}[r.level]||'';
    const summary=buildSummary(r); const tips=buildTips(r);
    analysisResult.innerHTML=`
     <div class="an">
      <div class="an-top">
        <div class="an-chip"><b>일간 (사주)</b><span class="v">${STEMS[r.dp.stem]}${BRANCHES[r.dp.branch]} · ${EL_NAME[r.dayMasterEl]}</span></div>
        <div class="an-chip"><b>오행 균형</b><span class="v">${ohaengStr(r.cnt)}</span></div>
        <div class="an-chip"><b>MBTI</b><span class="v">${r.mbti||'—'}</span></div>
        <div class="an-chip"><b>학교급</b><span class="v">${lv}${r.age!=null?` · 만 ${r.age}세`:''}</span></div>
      </div>
      ${bars}
      <div class="daynight">
        <div class="dn-card ${r.dn.isM||r.dn.near?'on':''}"><span class="big">🌅</span>아침형</div>
        <div class="dn-card ${!r.dn.isM||r.dn.near?'on':''}"><span class="big">🌙</span>밤형</div>
      </div>
      <div style="font-size:13px;color:var(--text-sub);margin-top:6px;">${r.dn.desc}</div>
      <div class="an-summary">${summary.replace(/</g,'&lt;')}</div>
      <div class="an-tip"><b>📝 계획 팁</b><br>${tips.map(x=>'· '+x).join('<br>')}</div>
      <div class="an-disclaimer">※ 사주는 출생시간·절기에 따라 달라질 수 있는 참고용 경향 분석이며, 성적·기질을 종합한 학습 가이드입니다. (요약 ${summary.length}자)</div>
     </div>`;
    analysisResult.scrollIntoView({behavior:'smooth',block:'nearest'});
  }
  analyzeBtn.addEventListener('click', renderResult);

  // ================= 초기 렌더 =================
  renderSubjectInputs();
  renderAll();
</script>
</body>
</html>
