<!DOCTYPE html>
<html lang="ko">
<head>
<script src="/analytics.js"></script>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>한번에 — 광고 카드</title>
<link rel="preconnect" href="https://cdn.jsdelivr.net">
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Pretendard', -apple-system, sans-serif;
    background: #ECEAE4;
    display: flex; flex-direction: column; align-items: center;
    padding: 22px 16px 60px; min-height: 100vh;
  }
  .hint { font-size: 13.5px; color: #6B7079; text-align: center; margin-bottom: 16px; line-height: 1.6; max-width: 460px; }
  .hint b { color: #0B7A70; }

  /* ===== 1:1 광고 카드 ===== */
  .card {
    width: min(92vw, 460px); aspect-ratio: 1 / 1;
    background:
      radial-gradient(120% 80% at 80% -10%, #D7F2EC 0%, rgba(215,242,236,0) 55%),
      linear-gradient(160deg, #FFFFFF 0%, #F6F4EF 100%);
    border-radius: 30px;
    box-shadow: 0 18px 50px rgba(20,40,38,.16);
    position: relative; overflow: hidden;
    padding: 8.5% 8% 7.5%;
    display: flex; flex-direction: column;
  }
  .brand { display: inline-flex; align-items: center; gap: 7px; align-self: flex-start;
    background: #0D9488; color: #fff; font-weight: 800; font-size: 4.1cqw;
    padding: 1.6cqw 3.4cqw; border-radius: 999px; letter-spacing: -.3px; }
  .card { container-type: inline-size; }

  .headline { margin-top: 7.5%; font-weight: 800; color: #23262B; font-size: 8.7cqw;
    line-height: 1.28; letter-spacing: -1.2px; }
  .headline .hl { color: #0D9488; }
  .sub { margin-top: 3.5%; font-size: 4.1cqw; color: #5A616B; font-weight: 600; line-height: 1.5; }

  .pills { margin-top: 7%; display: flex; flex-wrap: wrap; gap: 2.4cqw; }
  .pill { display: inline-flex; align-items: center; gap: 1.6cqw;
    background: #fff; border: 1.5px solid #DCEEE9; color: #1F4E48;
    font-weight: 700; font-size: 3.7cqw; padding: 2.2cqw 3.6cqw; border-radius: 999px;
    box-shadow: 0 4px 12px rgba(13,148,136,.07); }
  .pill .e { font-size: 4.3cqw; }

  .spacer { flex: 1; }

  .cta { background: #0D9488; color: #fff; border-radius: 18px;
    padding: 4.6cqw 5cqw; text-align: center;
    box-shadow: 0 10px 24px rgba(13,148,136,.30); }
  .cta .big { font-size: 5.6cqw; font-weight: 800; letter-spacing: -.5px; }
  .cta .small { font-size: 3.5cqw; font-weight: 600; opacity: .95; margin-top: 1.2cqw; }
  .link { text-align: center; margin-top: 3.6%; font-size: 3.7cqw; font-weight: 700; color: #23262B; }
  .link .arrow { color: #0D9488; }

  .save-btn { margin-top: 22px; padding: 14px 34px; background: #0D9488; color: #fff;
    border: none; border-radius: 12px; font-size: 16px; font-weight: 800; cursor: pointer;
    font-family: inherit; box-shadow: 0 8px 20px rgba(13,148,136,.28); }
  .save-btn:active { transform: translateY(1px); }
  .cap { margin-top: 14px; font-size: 12.5px; color: #8A8F98; text-align: center; }
</style>
</head>
<body>
  <div class="hint">아래 카드를 <b>이미지 저장</b> → 인스타 ➕ 게시물로 올리세요.<br>글 마지막에 “👆 <b>프로필 링크</b>에서 무료 시작” 을 꼭 넣어요.</div>

  <div class="card" id="adcard">
    <span class="brand">📅 한번에</span>
    <div class="headline">흩어진 우리 아이 일정,<br>이제 <span class="hl">한 번에.</span></div>
    <div class="sub">학교·학원·수행평가·성적·공부 성향까지<br>한 곳에서 관리하는 무료 앱</div>

    <div class="pills">
      <span class="pill"><span class="e">🗓️</span>일정 한눈에</span>
      <span class="pill"><span class="e">🔔</span>수행평가 D-day</span>
      <span class="pill"><span class="e">📊</span>성향·성적 분석</span>
      <span class="pill"><span class="e">👩‍👧</span>여러 자녀 한 곳</span>
    </div>

    <div class="spacer"></div>

    <div class="cta">
      <div class="big">무료 · 가입 없이 바로 시작</div>
      <div class="small">우리 아이 하루를 한 번에 정리</div>
    </div>
    <div class="link"><span class="arrow">👆</span> 프로필 링크에서 시작하세요</div>
  </div>

  <button class="save-btn" id="saveBtn">💾 이미지 저장</button>
  <div class="cap">고화질(1080px)로 저장돼요 · 인스타 정사각형(1:1)</div>

  <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
  <script>
    document.getElementById('saveBtn').addEventListener('click', function () {
      var el = document.getElementById('adcard');
      var btn = this; btn.disabled = true; btn.textContent = '저장 중…';
      html2canvas(el, { scale: 1080 / el.offsetWidth, backgroundColor: null, useCORS: true }).then(function (canvas) {
        var a = document.createElement('a');
        a.download = 'hanbeone_ad.png';
        a.href = canvas.toDataURL('image/png');
        document.body.appendChild(a); a.click(); a.remove();
        btn.disabled = false; btn.textContent = '💾 이미지 저장';
      }).catch(function () { btn.disabled = false; btn.textContent = '💾 이미지 저장'; alert('저장에 실패했어요. 다시 시도해 주세요.'); });
    });
  </script>
</body>
</html>
