<!DOCTYPE html>
<html lang="ko">
<head>
<script src="/analytics.js"></script>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>아이담다 — 광고 카드</title>
<link rel="preconnect" href="https://cdn.jsdelivr.net">
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Pretendard', -apple-system, sans-serif;
    background: #ECEAE4;
    display: flex; flex-direction: column; align-items: center;
    padding: 22px 16px 60px; min-height: 100vh;
  }
  .hint { font-size: 13.5px; color: #6B7079; text-align: center; margin-bottom: 16px; line-height: 1.6; max-width: 460px; }
  .hint b { color: #0B7A70; }

  /* 화면에선 stage 크기로 축소해 보여주고, 저장은 1080px 원본으로 */
  .stage { width: min(92vw, 440px); aspect-ratio: 1 / 1; position: relative; }

  /* ===== 1080×1080 광고 카드 (모든 값 px 고정) ===== */
  .card {
    width: 1080px; height: 1080px; transform-origin: top left;
    position: absolute; top: 0; left: 0;
    background:
      radial-gradient(120% 80% at 82% -8%, #D7F2EC 0%, rgba(215,242,236,0) 52%),
      linear-gradient(158deg, #FFFFFF 0%, #F6F4EF 100%);
    border-radius: 64px;
    padding: 96px 92px 88px;
    display: flex; flex-direction: column;
    overflow: hidden;
  }
  .brand { display: inline-flex; align-items: center; gap: 16px; align-self: flex-start;
    background: #0D9488; color: #fff; font-weight: 800; font-size: 46px;
    padding: 18px 40px; border-radius: 999px; letter-spacing: -1px; }

  .headline { margin-top: 78px; font-weight: 800; color: #23262B; font-size: 96px;
    line-height: 1.26; letter-spacing: -3px; }
  .headline .hl { color: #0D9488; }
  .sub { margin-top: 36px; font-size: 43px; color: #5A616B; font-weight: 600; line-height: 1.5; letter-spacing: -1px; }

  .pills { margin-top: 70px; display: flex; flex-wrap: wrap; gap: 22px; }
  .pill { display: inline-flex; align-items: center; gap: 14px;
    background: #fff; border: 2px solid #DCEEE9; color: #1F4E48;
    font-weight: 700; font-size: 39px; padding: 22px 38px; border-radius: 999px;
    box-shadow: 0 6px 16px rgba(13,148,136,.08); letter-spacing: -1px; }
  .pill .e { font-size: 46px; }

  .spacer { flex: 1; min-height: 30px; }

  .cta { background: #0D9488; color: #fff; border-radius: 36px;
    padding: 50px 48px; text-align: center;
    box-shadow: 0 18px 40px rgba(13,148,136,.30); }
  .cta .big { font-size: 60px; font-weight: 800; letter-spacing: -1.5px; }
  .cta .small { font-size: 37px; font-weight: 600; opacity: .96; margin-top: 14px; letter-spacing: -1px; }
  .link { text-align: center; margin-top: 34px; font-size: 41px; font-weight: 700; color: #23262B; letter-spacing: -1px; }
  .link .arrow { color: #0D9488; }

  .save-btn { margin-top: 22px; padding: 14px 34px; background: #0D9488; color: #fff;
    border: none; border-radius: 12px; font-size: 16px; font-weight: 800; cursor: pointer;
    font-family: inherit; box-shadow: 0 8px 20px rgba(13,148,136,.28); }
  .save-btn:active { transform: translateY(1px); }
  .cap { margin-top: 14px; font-size: 12.5px; color: #8A8F98; text-align: center; }
</style>
</head>
<body>
  <div class="hint">아래 카드를 <b>이미지 저장</b> → 인스타 ➕ 게시물로 올리세요.<br>글 마지막에 “👆 <b>프로필 링크</b>에서 무료 시작” 을 꼭 넣어요.</div>

  <div class="stage" id="stage">
    <div class="card" id="adcard">
      <span class="brand">📅 아이담다</span>
      <div class="headline">흩어진 우리 아이 일정,<br>이제 <span class="hl">한 번에.</span></div>
      <div class="sub">학교·학원·수행평가·성적·공부 성향까지<br>한 곳에서 관리하는 무료 앱</div>

      <div class="pills">
        <span class="pill"><span class="e">🗓️</span>일정 한눈에</span>
        <span class="pill"><span class="e">🔔</span>수행평가 D-day</span>
        <span class="pill"><span class="e">📊</span>성향·성적 분석</span>
        <span class="pill"><span class="e">👩‍👧</span>여러 자녀 한 곳</span>
      </div>

      <div class="spacer"></div>

      <div class="cta">
        <div class="big">무료 · 가입 없이 바로 시작</div>
        <div class="small">우리 아이 하루를 한 번에 정리</div>
      </div>
      <div class="link"><span class="arrow">👆</span> 프로필 링크에서 시작하세요</div>
    </div>
  </div>

  <button class="save-btn" id="saveBtn">💾 이미지 저장</button>
  <div class="cap">고화질(1080×1080)로 저장돼요 · 인스타 정사각형(1:1)</div>

  <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
  <script>
    var stage = document.getElementById('stage');
    var card = document.getElementById('adcard');
    function fit() { card.style.transform = 'scale(' + (stage.clientWidth / 1080) + ')'; }
    fit(); window.addEventListener('resize', fit);

    document.getElementById('saveBtn').addEventListener('click', function () {
      var btn = this; btn.disabled = true; btn.textContent = '저장 중…';
      card.style.transform = 'none';              // 원본 1080px로 캡처
      html2canvas(card, { scale: 1, width: 1080, height: 1080, backgroundColor: null, useCORS: true }).then(function (canvas) {
        var a = document.createElement('a');
        a.download = 'hanbeone_ad.png';
        a.href = canvas.toDataURL('image/png');
        document.body.appendChild(a); a.click(); a.remove();
        fit(); btn.disabled = false; btn.textContent = '💾 이미지 저장';
      }).catch(function () { fit(); btn.disabled = false; btn.textContent = '💾 이미지 저장'; alert('저장에 실패했어요. 다시 시도해 주세요.'); });
    });
  </script>
</body>
</html>
