<!DOCTYPE html>
<html lang="ko">
<head>
<script src="/analytics.js"></script>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>아이담다 · QR 카드</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, 'Malgun Gothic', sans-serif;
    background: #E9EBEF;
    display: flex; align-items: center; justify-content: center;
    min-height: 100vh; padding: 20px;
  }
  /* 인스타 정사각형(1080x1080)에 맞춘 카드 */
  .card {
    width: 460px; max-width: 100%; aspect-ratio: 1 / 1;
    background: linear-gradient(155deg, #1F2430 0%, #2A2F3C 55%, #0D9488 160%);
    border-radius: 28px; color: #fff; text-align: center;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    padding: 34px; box-shadow: 0 16px 50px rgba(0,0,0,.25);
  }
  .brand { font-size: 52px; font-weight: 800; letter-spacing: -1px; }
  .brand b { color: #5EEAD4; }
  .tag { margin-top: 8px; font-size: 17px; color: #CBD5D3; line-height: 1.5; }
  .qr {
    margin: 22px 0 14px; background: #fff; padding: 12px;
    border-radius: 18px; box-shadow: 0 6px 20px rgba(0,0,0,.2);
  }
  .qr img { display: block; width: 200px; height: 200px; }
  .scan { font-size: 14px; color: #9FB4B0; margin-bottom: 6px; }
  .url {
    font-size: 19px; font-weight: 700; color: #fff;
    background: rgba(255,255,255,.12); padding: 8px 18px; border-radius: 999px;
  }
  .feats { margin-top: 18px; font-size: 14px; color: #CBD5D3; line-height: 1.7; }
  .hint { margin-top: 16px; font-size: 12px; color: #6b7280; }
  @media (max-width: 520px) { .brand { font-size: 42px; } .qr img { width: 170px; height: 170px; } }
</style>
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" rel="stylesheet">
<link rel="manifest" href="/app.webmanifest">
<meta name="theme-color" content="#0D9488">
<link rel="apple-touch-icon" href="/apple-touch-icon.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="아이담다">
<script src="/pwa.js" defer></script>
</head>
<body>
  <div>
    <div class="card">
      <div class="brand">한<b>번</b>에</div>
      <div class="tag">학교·학원 스케줄을 한 번에<br>수행평가 알림 · 성적 분석 · 실행까지</div>
      <div class="qr">
        <img src="https://api.qrserver.com/v1/create-qr-code/?size=400x400&margin=0&data=https%3A%2F%2Fhanbeone.vercel.app" alt="QR 코드">
      </div>
      <div class="scan">📷 QR을 스캔하거나 주소로 접속</div>
      <div class="url">hanbeone.vercel.app</div>
      <div class="feats">📚 학교·학원 한 번에 · 🔔 수행평가 알림 · 📊 성적 분석</div>
    </div>
    <p class="hint">이 화면을 캡처해 인스타그램에 올리세요. (스토리·게시물·릴스 표지)</p>
  </div>
</body>
</html>
