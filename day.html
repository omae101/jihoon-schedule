<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>일별 계획표</title>
<style>
  :root {
    --bg: #FAF6EE;
    --surface: #FFFFFF;
    --surface-soft: #F5EDE0;
    --cell-bg: #F7F4ED;
    --text-main: #3E2723;
    --text-sub: #6D4C41;
    --text-mute: #A1887F;
    --line: #E8DCC8;
    --line-strong: #D7CCC8;
    --accent: #00897B;
    --accent-soft: #B2DFDB;
    --accent-dark: #00695C;
    --weekend: #C62828;
  }
  * { box-sizing: border-box; }
  body {
    font-family: 'Malgun Gothic', '맑은 고딕', sans-serif;
    background: var(--bg);
    margin: 0;
    padding: 30px 20px;
    color: var(--text-main);
  }
  .container { max-width: 1200px; margin: 0 auto; background: var(--surface); border-radius: 16px; box-shadow: 0 4px 20px rgba(62,39,35,0.06); padding: 36px; border: 1px solid var(--line); }
  .header-bar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; flex-wrap: wrap; gap: 8px; }
  .nav-btn { background: var(--surface); color: var(--text-main); border: 1px solid var(--line-strong); border-radius: 6px; padding: 8px 16px; cursor: pointer; font-size: 13px; font-weight: 500; text-decoration: none; transition: all 0.15s; }
  .nav-btn:hover { border-color: var(--accent); color: var(--accent); }
  .nav-btn.home { background: var(--accent); color: white; border-color: var(--accent); }
  .nav-btn.home:hover { background: var(--accent-dark); color: white; }
  .date-info { text-align: center; font-size: 20px; font-weight: 600; margin-bottom: 12px; }
  .toolbar { display: flex; gap: 8px; margin-bottom: 12px; }
  .btn { padding: 7px 16px; border: 1px solid var(--line-strong); background: var(--surface); color: var(--text-main); border-radius: 6px; cursor: pointer; font-size: 13px; transition: all 0.15s; }
  .btn:hover { border-color: var(--accent); color: var(--accent); }
  .main-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; margin-bottom: 24px; }
  h3 { margin: 12px 0 8px; font-size: 16px; color: var(--text-main); }
  table { width: 100%; border-collapse: collapse; table-layout: fixed; }
  th, td { border: 1px solid var(--line); padding: 8px; font-size: 13px; text-align: center; }
  th { background: var(--surface-soft); font-weight: 600; }
  td.time { background: var(--surface-soft); color: var(--text-sub); width: 110px; }
  td.time:focus { outline: none; border: 1px solid var(--accent); background: var(--surface); }
  td.editable { background: var(--cell-bg); cursor: text; }
  td.editable:focus { outline: none; border: 1px solid var(--accent); background: var(--surface); }
  .todo-done { text-decoration: line-through; color: var(--weekend); }
  textarea { width: 100%; height: 80px; padding: 7px 8px; border: 1px solid var(--line-strong); border-radius: 6px; font-size: 13px; resize: vertical; }
</style>
</head>
<body>
<div class="container">
    <div class="header-bar">
      <a href="month.html" class="nav-btn home">← 월간 보기</a>
      <button class="btn" id="prevBtn">← 전날</button>
      <button class="btn" id="nextBtn">다음날 →</button>
    </div>
    <div class="date-info" id="dateTitle"></div>
    <div class="toolbar">
      <button class="btn" id="clearBtn">전체 초기화</button>
      <button class="btn" id="resetBtn">새 일정 만들기</button>
      <button class="btn" id="schoolBtn">🏫</button>
      <button class="btn" id="academyBtn">🎓</button>
    </div>
  <div style="margin-bottom:12px;">
    <textarea id="assessmentInput" placeholder="오늘의 수행평가..."></textarea>
  </div>

  <div class="main-grid">
    <section class="schedule-section">
      <h3>할일</h3>
      <table id="timetable">
        <thead><tr><th class="time">시간</th><th class="editable">내용</th></tr></thead>
        <tbody></tbody>
      </table>
    </section>
    <section class="schedule-section">
      <h3>학교 시간표</h3>
      <table id="schoolTable">
        <thead>
          <tr><th class="time">시간</th><th class="editable">내용</th></tr>
        </thead>
        <tbody></tbody>
      </table>
    </section>
    <section class="schedule-section">
      <h3>학원 시간표</h3>
      <table id="academyTable">
        <thead>
          <tr><th class="time">시간</th><th class="editable">내용</th></tr>
        </thead>
        <tbody></tbody>
      </table>
    </section>
    <section class="todo-section">
      <h3>to do 리스트</h3>
      <table id="todoTable">
        <thead><tr><th class="editable">할일</th><th>완료</th></tr></thead>
        <tbody></tbody>
      </table>
      <button class="btn" id="addTodoBtn">할일 추가</button>
      <div style="margin-top:12px;">
        <textarea id="memoArea" placeholder="메모..." style="width:100%;height:80px;padding:7px 8px;border:1px solid var(--line-strong);border-radius:6px;font-size:13px;resize:vertical;"></textarea>
      </div>
    </section>
  </div>
</div>
<script>
  // ---------- 날짜 및 키 ----------
  const urlParams = new URLSearchParams(location.search);
  let selectedDate = urlParams.get('date') || new Date().toISOString().split('T')[0]; // YYYY-MM-DD
  let assessmentKey = `assessment_${selectedDate}`;
  let timetableKey   = `timetable_${selectedDate}`;
  let todoKey        = `todo_${selectedDate}`;
  let memoKey        = `memo_${selectedDate}`;
  let schoolKey      = `school_${selectedDate}`;
  let academyKey     = `academy_${selectedDate}`;

  function updateKeys(){
    assessmentKey = `assessment_${selectedDate}`;
    timetableKey   = `timetable_${selectedDate}`;
    todoKey        = `todo_${selectedDate}`;
    schoolKey      = `school_${selectedDate}`;
    academyKey     = `academy_${selectedDate}`;
    memoKey        = `memo_${selectedDate}`;
  }

  // ---------- 날짜 표시 ----------
  function renderDateInfo(){
    const d = new Date(selectedDate);
    const year = d.getFullYear();
    const month = String(d.getMonth()+1).padStart(2,'0');
    const day = String(d.getDate()).padStart(2,'0');
    const week = ['일','월','화','수','목','금','토'][d.getDay()];
    document.getElementById('dateTitle').textContent = `${year}년 ${month}월 ${day}일 (${week}요일)`;
  }

  function changeDate(offset){
    const newDate = new Date(selectedDate);
    newDate.setDate(newDate.getDate() + offset);
    selectedDate = newDate.toISOString().split('T')[0];
    updateKeys();
    // update URL without reloading page
    const newUrl = `${location.pathname}?date=${selectedDate}`;
    history.replaceState(null, '', newUrl);
    renderDateInfo();
    timetableBody.innerHTML='';
    todoBody.innerHTML='';
    loadTimetable();
    loadTodo();
    renderAssessment();
    loadMemo();
    // Load school and academy timetables for the selected date
    loadSchool();
    loadAcademy();
  }

  document.getElementById('prevBtn').addEventListener('click', () => changeDate(-1));
  document.getElementById('nextBtn').addEventListener('click', () => changeDate(1));
  // toggle school timetable visibility
  document.getElementById('schoolBtn').addEventListener('click', () => {
    const sec = document.querySelector('#schoolTable').parentElement;
    sec.style.display = sec.style.display === 'none' ? 'block' : 'none';
    if (sec.style.display !== 'none') loadSchool();
  });
  // toggle academy timetable visibility
  document.getElementById('academyBtn').addEventListener('click', () => {
    const sec = document.querySelector('#academyTable').parentElement;
    sec.style.display = sec.style.display === 'none' ? 'block' : 'none';
    if (sec.style.display !== 'none') loadAcademy();
  });

  // ---------- 시간 포맷 (시:분) ----------
  function fmt(min){
    const h = Math.floor(min/60)%24;
    const m = min%60;
    return `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}`;
  }

  // ---------- 수행평가 ----------
  const assessmentInput = document.getElementById('assessmentInput');
  function renderAssessment(){
    assessmentInput.value = localStorage.getItem(assessmentKey) || '';
  }
  assessmentInput.addEventListener('blur',()=>{
    localStorage.setItem(assessmentKey, assessmentInput.value);
  });

  // ---------- 개인 시간표 (블록) ----------
  const timetableBody = document.querySelector('#timetable tbody');
  function defaultTimetable(){
  const blocks = [
    {start:0, end:6*60, text:'잠자는 시간'},
    {start:6*60, end:8*60, text:'자습·식사'},
    {start:8*60, end:15*60+30, text:'학교'}
  ];
  // add hourly blocks for remaining time
  for(let t=15*60+30; t<24*60; t+=60){
    const end = Math.min(t+60, 24*60);
    blocks.push({start:t, end:end, text:''});
  }
  return blocks;
}
  function loadTimetable(){
    const data = localStorage.getItem(timetableKey);
    if(data){
      const rows = JSON.parse(data);
      rows.forEach(r=>createRow(r.time, r.text));
    } else {
      defaultTimetable().forEach(b=>createRow(`${fmt(b.start)}-${fmt(b.end)}`, b.text));
    }
  }

  function loadSchool(){
    const data = localStorage.getItem(schoolKey);
    const tbody = document.querySelector('#schoolTable tbody');
    tbody.innerHTML='';
    if(data){
      const rows = JSON.parse(data);
      rows.forEach(r=>createSchoolRow(r.time, r.text));
    } else {
      // default empty rows (e.g., 8am-5pm)
      createSchoolRow('08:00-09:00','');
    }
  }

  function saveSchool(){
    const rows = [...document.querySelectorAll('#schoolTable tbody tr')].map(tr=>({
      time: tr.children[0].textContent,
      text: tr.children[1].textContent
    }));
    localStorage.setItem(schoolKey, JSON.stringify(rows));
  }

  function createSchoolRow(timeStr, text=''){
    const tr = document.createElement('tr');
    const tdTime = document.createElement('td');
    tdTime.className='time';
    tdTime.textContent=timeStr;
    tdTime.contentEditable=true;
    tdTime.addEventListener('blur', saveSchool);
    const tdEdit = document.createElement('td');
    tdEdit.className='editable';
    tdEdit.contentEditable=true;
    tdEdit.textContent=text;
    tdEdit.addEventListener('blur', saveSchool);
    tr.appendChild(tdTime);
    tr.appendChild(tdEdit);
    document.querySelector('#schoolTable tbody').appendChild(tr);
  }

  function loadAcademy(){
    const data = localStorage.getItem(academyKey);
    const tbody = document.querySelector('#academyTable tbody');
    tbody.innerHTML='';
    if(data){
      const rows = JSON.parse(data);
      rows.forEach(r=>createAcademyRow(r.time, r.text));
    } else {
      createAcademyRow('08:00-09:00','');
    }
  }

  function saveAcademy(){
    const rows = [...document.querySelectorAll('#academyTable tbody tr')].map(tr=>({
      time: tr.children[0].textContent,
      text: tr.children[1].textContent
    }));
    localStorage.setItem(academyKey, JSON.stringify(rows));
  }

  function createAcademyRow(timeStr, text=''){
    const tr = document.createElement('tr');
    const tdTime = document.createElement('td');
    tdTime.className='time';
    tdTime.textContent=timeStr;
    tdTime.contentEditable=true;
    tdTime.addEventListener('blur', saveAcademy);
    const tdEdit = document.createElement('td');
    tdEdit.className='editable';
    tdEdit.contentEditable=true;
    tdEdit.textContent=text;
    tdEdit.addEventListener('blur', saveAcademy);
    tr.appendChild(tdTime);
    tr.appendChild(tdEdit);
    document.querySelector('#academyTable tbody').appendChild(tr);
  }
  function createRow(timeStr, text=''){
  const tr = document.createElement('tr');
  const tdTime = document.createElement('td');
  tdTime.className = 'time';
  tdTime.textContent = timeStr;
  tdTime.contentEditable = true;
  tdTime.addEventListener('blur', function(){
    const pattern = /^\d{2}:\d{2}-\d{2}:\d{2}$/;
    if(!pattern.test(tdTime.textContent.trim())){
      alert('시간 형식은 HH:MM-HH:MM 이어야 합니다.');
      // revert to previous saved value if needed (fallback to original)
      const rows = JSON.parse(localStorage.getItem(timetableKey)||'[]');
      const index = Array.from(timetableBody.children).indexOf(tr);
      if(rows[index]) tdTime.textContent = rows[index].time;
    } else {
      saveTimetable();
    }
  });
  tdTime.addEventListener('keydown', e => { if(e.key==='Enter'){ e.preventDefault(); tdTime.blur(); } });
  // double‑click to split into 10‑minute slots
  tdTime.addEventListener('dblclick',() => splitRow(tr));
  const tdEdit = document.createElement('td');
  tdEdit.className = 'editable';
  tdEdit.contentEditable = true;
  tdEdit.textContent = text;
  tdEdit.addEventListener('blur', saveTimetable);
  tdEdit.addEventListener('keydown', e=>{ if(e.key==='Enter'){ e.preventDefault(); tdEdit.blur(); } });
  tr.appendChild(tdTime);
  tr.appendChild(tdEdit);
  timetableBody.appendChild(tr);
}
  function saveTimetable(){
    const rows = [...timetableBody.querySelectorAll('tr')].map(tr=>({
      time: tr.children[0].textContent,
      text: tr.children[1].textContent
    }));
    localStorage.setItem(timetableKey, JSON.stringify(rows));
  }

  // Split a row into 10‑minute slots
  function splitRow(row){
    const tdTime = row.children[0];
    const tdEdit = row.children[1];
    const timeRange = tdTime.textContent;
    const [startStr, endStr] = timeRange.split('-');
    const startMin = parseInt(startStr.split(':')[0]) * 60 + parseInt(startStr.split(':')[1]);
    const endMin = parseInt(endStr.split(':')[0]) * 60 + parseInt(endStr.split(':')[1]);
    const text = tdEdit.textContent;
    // remove original row
    row.remove();
    for(let m = startMin; m < endMin; m += 10){
      const segEnd = Math.min(m + 10, endMin);
      createRow(`${fmt(m)}-${fmt(segEnd)}`, text);
    }
    saveTimetable();
  }

  // ---------- 투두리스트 ----------
  const todoBody = document.querySelector('#todoTable tbody');
  function loadTodo(){
    const data = localStorage.getItem(todoKey);
    if(data){
      const rows = JSON.parse(data);
      rows.forEach(r=>addTodoRow(r.text, r.done));
    } else {
      for(let i=0;i<5;i++) addTodoRow('', false);
    }
  }
  function addTodoRow(text='', done=false){
    const tr = document.createElement('tr');
    const tdText = document.createElement('td');
    tdText.className = 'editable';
    tdText.contentEditable = true;
    tdText.textContent = text;
    tdText.addEventListener('blur', saveTodo);
    tdText.addEventListener('keydown', e=>{ if(e.key==='Enter'){ e.preventDefault(); tdText.blur(); } });
    const tdChk = document.createElement('td');
    const chk = document.createElement('input');
    chk.type = 'checkbox';
    chk.checked = done;
    chk.addEventListener('change',()=>{ if(chk.checked) tdText.classList.add('todo-done'); else tdText.classList.remove('todo-done'); saveTodo(); });
    if(done) tdText.classList.add('todo-done');
    tdChk.appendChild(chk);
    tr.appendChild(tdText);
    tr.appendChild(tdChk);
    todoBody.appendChild(tr);
  }
  function saveTodo(){
    const rows = [...todoBody.querySelectorAll('tr')].map(tr=>({
      text: tr.children[0].textContent,
      done: tr.children[1].querySelector('input').checked
    }));
    localStorage.setItem(todoKey, JSON.stringify(rows));
  }

  // ---------- 메모 ----------
  const memoArea = document.getElementById('memoArea');
  function loadMemo(){
    memoArea.value = localStorage.getItem(memoKey) || '';
  }
  memoArea.addEventListener('blur', () => {
    localStorage.setItem(memoKey, memoArea.value);
  });

  // ---------- 초기화 / 리셋 ----------
  const clearBtn = document.getElementById('clearBtn');
  const resetBtn = document.getElementById('resetBtn');
  function resetAll(){
    localStorage.removeItem(assessmentKey);
    localStorage.removeItem(timetableKey);
    localStorage.removeItem(todoKey);
    localStorage.removeItem(memoKey);
    // rebuild UI
    timetableBody.innerHTML='';
    loadTimetable();
    todoBody.innerHTML='';
    loadTodo();
    renderAssessment();
    loadMemo();
  }
  clearBtn.addEventListener('click',()=>{ if(confirm('전체 초기화하시겠습니까?')) resetAll(); });
  resetBtn.addEventListener('click',()=>{ resetAll(); });

  // ---------- 투두 추가 ----------
  document.getElementById('addTodoBtn').addEventListener('click',()=>addTodoRow());

  // ---------- 초기 실행 ----------
  renderDateInfo();
  renderAssessment();
  loadTimetable();
  loadTodo();
  loadMemo();
  // hide school/academy sections initially
  document.querySelector('#schoolTable').parentElement.style.display='none';
  document.querySelector('#academyTable').parentElement.style.display='none';
</script>
</body>
</html>
