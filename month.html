<!DOCTYPE html>
<html lang="ko">
<head>
<script src="/analytics.js"></script>
<meta charset="UTF-8">
<script src="/profiles.js"></script>
<script src="/theme.js"></script>
<script src="/holidays.js"></script>
<script src="/academy-events.js"></script>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>월간 스케줄표</title>
<style>
  :root {
    --bg: #F4F5F8;
    --surface: #FFFFFF;
    --surface-soft: #F3F5F8;
    --text-main: #23262B;
    --text-sub: #565C66;
    --text-mute: #9CA1AB;
    --line: #EBEDF1;
    --line-strong: #D7DBE1;
    --accent: #0D9488;
    --accent-soft: #CCFBF1;
    --accent-dark: #0B7A70;
    --weekend: #D9766F;
    --ink: #1F2430;
    --ink-dark: #11141B;
  }
  * { box-sizing: border-box; }
  body {
    font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, 'Malgun Gothic', sans-serif;
    background: var(--bg);
    margin: 0;
    padding: 30px 20px;
    color: var(--text-main);
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
  }
  .container {
    max-width: 1500px;
    margin: 0 auto;
    background: var(--surface);
    border-radius: 20px;
    box-shadow: 0 4px 20px rgba(62,39,35,0.06);
    padding: 36px;
    border: 1px solid var(--line);
  }
  .header-bar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 12px;
    gap: 8px;
    background: transparent;
    padding: 0;
  }
  .nav-btn {
    background: var(--surface);
    color: var(--text-main);
    border: 1px solid var(--line-strong);
    border-radius: 8px;
    padding: 7px 11px;
    cursor: pointer;
    font-size: 12.5px;
    font-weight: 600;
    text-decoration: none;
    display: inline-block;
    white-space: nowrap;
    transition: all 0.15s;
  }
  .nav-btn:hover { border-color: var(--accent); color: var(--accent); }
  .nav-btn.home { background: var(--accent); color: white; border-color: var(--accent); }
  .month-switch { display: flex; align-items: center; gap: 10px; }
  .nav-arrow {
    width: 34px; height: 34px; display: flex; align-items: center; justify-content: center;
    border: 1px solid var(--line-strong); border-radius: 8px; background: var(--surface);
    color: var(--text-main); text-decoration: none; font-size: 14px;
  }
  .nav-arrow:hover { border-color: var(--accent); color: var(--accent); }
  .hb-spacer { width: 56px; flex: none; }
  h1 {
    text-align: center;
    color: var(--text-main);
    margin: 0;
    font-size: 20px;
    font-weight: 800;
    white-space: nowrap;
  }
  .subtitle { display: none; }

  .monthly-plan-box {
    margin-bottom: 20px;
    padding: 14px 20px;
    background: var(--surface-soft);
    border-left: 3px solid var(--accent);
    border-radius: 6px;
  }
  .monthly-plan-box h3 {
    margin: 0 0 8px 0;
    color: var(--text-main);
    font-size: 14px;
    font-weight: 600;
  }
  .monthly-plan-area {
    width: 100%;
    min-height: 50px;
    padding: 8px 10px;
    border: 1px solid var(--line);
    border-radius: 4px;
    font-family: inherit;
    font-size: 13px;
    resize: vertical;
    background: var(--surface);
    color: var(--text-main);
  }
  .monthly-plan-area:focus { outline: none; border-color: var(--accent); }
  .extra-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 20px; }
  .extra-grid h3 { margin: 0 0 6px; font-size: 14px; font-weight: 600; color: var(--text-main); }
  @media (max-width: 760px) { .extra-grid { grid-template-columns: 1fr; } }

  .help-box {
    background: var(--surface-soft);
    padding: 10px 18px;
    border-radius: 6px;
    margin-bottom: 18px;
    font-size: 13px;
    color: var(--text-sub);
    text-align: center;
    border: 1px solid var(--line);
  }
  .toolbar {
    display: flex;
    justify-content: center;
    gap: 8px;
    margin-bottom: 18px;
    flex-wrap: wrap;
  }
  .btn {
    padding: 7px 16px;
    border: 1px solid var(--line-strong);
    background: var(--surface);
    color: var(--text-main);
    border-radius: 6px;
    cursor: pointer;
    font-size: 13px;
    font-weight: 500;
    transition: background 0.2s, color 0.2s;
  }
  .btn:hover { border-color: var(--accent); color: var(--accent); }
  .subject-btn {
    background: var(--accent-soft);
    color: var(--text-main);
    border: 1px solid var(--accent);
  }
  .subject-btn:hover {
    background: var(--accent);
    color: white;
  }
  .subject-panel {
    margin-top: 12px;
    padding: 10px;
    background: var(--surface-soft);
    border-left: 3px solid var(--accent);
    border-radius: 6px;
  }
  .subject-panel textarea {
    width: 100%;
    height: 80px;
    resize: vertical;
    padding: 6px;
    border: 1px solid var(--line);
    border-radius: 4px;
    font-family: inherit;
    font-size: 13px;
    background: var(--surface);
    color: var(--text-main);
  }
  /* 교재 편집칸 (글자 하이라이트 가능) */
  .subject-panel .textbook-edit {
    width: 100%; min-height: 84px; padding: 8px 9px;
    border: 1px solid var(--line); border-radius: 4px;
    font-family: inherit; font-size: 13px; line-height: 1.75;
    background: #fff; color: var(--text-main);
    white-space: pre-wrap; outline: none; overflow-y: auto;
  }
  .subject-panel .textbook-edit:empty:before { content: attr(data-ph); color: #9aa0a6; }
  .hl-toolbar { display: flex; align-items: center; gap: 6px; margin: 8px 0 6px; flex-wrap: wrap; }
  .hl-label { font-size: 12px; color: #7a818b; font-weight: 700; margin-right: 2px; }
  .hl-sw { width: 26px; height: 26px; border-radius: 7px; border: 1px solid #d7dbe0; cursor: pointer; padding: 0; }
  .hl-sw.hl-clear { background: #fff; color: #888; font-size: 13px; font-weight: 800; line-height: 1; }
  .hidden { display: none; }
  .subject-toolbar {
    display: flex;
    justify-content: center;
    gap: 8px;
    margin-bottom: 12px;
    flex-wrap: wrap;
  }

  table.calendar {
    width: 100%;
    border-collapse: collapse;
    table-layout: fixed;
  }
  table.calendar th {
    background: var(--surface-soft);
    color: var(--text-main);
    padding: 12px;
    font-size: 14px;
    font-weight: 600;
    border: 1px solid var(--line);
  }
  table.calendar th.sun { color: var(--weekend); }

  table.calendar td {
    border: 1px solid var(--line);
    padding: 0;
    height: 86px;
    vertical-align: top;
    background: var(--surface);
  }
  table.calendar td.empty-day { background: var(--bg); }
  /* 날짜 칸 = 클릭하면 그날로 이동. 일정은 칩으로 보기 전용 */
  .day-cell {
    height: 100%;
    display: flex;
    flex-direction: column;
    gap: 3px;
    padding: 5px 5px 4px;
    text-decoration: none;
    color: inherit;
    overflow: hidden;
    cursor: pointer;
  }
  .day-cell:hover { background: var(--accent-soft); }
  .day-cell.today-cell { background: #EFF8F7; }
  .day-top { display: flex; align-items: center; gap: 5px; }
  .day-number {
    font-size: 15px;
    font-weight: 700;
    color: var(--text-main);
    border-radius: 6px;
    padding: 1px 6px;
    line-height: 1.35;
  }
  .day-number.sun { color: var(--weekend); }
  .day-number.today { background: var(--accent); color: #fff; }
  .day-number.today.sun { color: #fff; }
  .dday-badge {
    padding: 1px 6px;
    border-radius: 9px;
    color: #fff;
    font-size: 9px;
    font-weight: 700;
    letter-spacing: 0.2px;
  }
  .day-chips { display: flex; flex-direction: column; gap: 2px; overflow: hidden; }
  .day-chip {
    font-size: 10.5px; line-height: 1.3; padding: 2px 5px; border-radius: 5px;
    background: #E9EBF3; color: #3C3F54;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .day-chip.up { background: #FFE3D6; color: #B5462A; }
  .day-chip.holi-chip { background: #FCE3E3; color: #C62828; font-weight: 700; }
  .day-chip.obs-chip { background: #ECEFF3; color: #5A6270; font-weight: 600; }
  .day-chip.sched { background: #E1EDFF; color: #2C5AA6; }  /* 일별 '오늘 일정' */
  .day-chip.todo-chip { background: #E4F5E9; color: #1E7A45; }  /* 일별 '할 일' */
  .day-more { font-size: 9.5px; color: var(--text-mute); padding-left: 4px; }

  .saved-indicator {
    position: fixed;
    bottom: 20px;
    right: 20px;
    background: var(--accent);
    color: white;
    padding: 10px 18px;
    border-radius: 8px;
    box-shadow: 0 4px 14px rgba(0,137,123,0.3);
    opacity: 0;
    transition: opacity 0.3s;
    z-index: 1000;
    font-size: 13px;
  }
  .saved-indicator.show { opacity: 1; }

  .legend-info {
    margin-top: 24px;
    padding: 14px 20px;
    background: var(--surface-soft);
    border-left: 3px solid var(--accent);
    border-radius: 6px;
    font-size: 13px;
    color: var(--text-sub);
    line-height: 1.7;
  }

  /* 시간표 모달 */
  .modal-overlay {
    display: none;
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(62,39,35,0.5);
    z-index: 999;
    justify-content: center;
    align-items: center;
    padding: 20px;
  }
  .modal-overlay.show { display: flex; }
  .modal-box {
    background: var(--surface);
    border-radius: 14px;
    padding: 28px;
    max-width: 720px;
    width: 100%;
    max-height: 90vh;
    overflow-y: auto;
    box-shadow: 0 12px 40px rgba(0,0,0,0.25);
  }
  .modal-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 16px;
    padding-bottom: 12px;
    border-bottom: 1px solid var(--line);
  }
  .modal-title {
    font-size: 20px;
    font-weight: 700;
    color: var(--text-main);
    margin: 0;
  }
  .modal-close {
    background: transparent;
    border: none;
    font-size: 24px;
    cursor: pointer;
    color: var(--text-sub);
    padding: 0 6px;
    line-height: 1;
  }
  .modal-close:hover { color: var(--text-main); }

  table.timetable {
    width: 100%;
    border-collapse: collapse;
    table-layout: fixed;
  }
  table.timetable th {
    background: var(--surface-soft);
    color: var(--text-main);
    padding: 8px;
    font-size: 13px;
    font-weight: 600;
    border: 1px solid var(--line);
  }
  table.timetable th.period-col { width: 70px; }
  table.timetable td {
    border: 1px solid var(--line);
    padding: 0;
    height: 44px;
    background: var(--surface);
  }
  table.timetable td.period-label {
    background: var(--surface-soft);
    color: var(--text-sub);
    font-size: 12px;
    font-weight: 500;
    text-align: center;
  }
  .subject-input {
    width: 100%;
    height: 100%;
    border: none;
    background: transparent;
    text-align: center;
    font-family: inherit;
    font-size: 13px;
    color: var(--text-main);
    outline: none;
    padding: 4px 6px;
  }
  .subject-input:focus {
    background: #FFFBE6;
    outline: 2px solid var(--accent);
    outline-offset: -2px;
  }
  .subject-input::placeholder {
    color: var(--text-mute);
    font-size: 12px;
  }
  .timetable-hint {
    font-size: 12px;
    color: var(--text-mute);
    margin-top: 12px;
    text-align: center;
  }
  .timetable-actions {
    display: flex;
    justify-content: flex-end;
    gap: 8px;
    margin-top: 14px;
  }

  @media print {
    body { background: white; padding: 0; }
    .container { box-shadow: none; }
    .toolbar, .help-box, .saved-indicator, .nav-btn { display: none !important; }
    .modal-overlay { display: none !important; }
  }
  /* 모바일 최적화 — 달력을 한눈에 */
  @media (max-width: 760px) {
    body { padding: 12px 6px; }
    .container { padding: 14px 10px; border-radius: 12px; }
    h1 { font-size: 18px; }
    .help-box, .legend-info { font-size: 12px; padding: 9px 12px; }
    table.calendar th { padding: 6px 2px; font-size: 12px; }
    table.calendar td { height: 74px; }
    .day-cell { padding: 3px 3px 2px; gap: 2px; }
    .day-number { font-size: 13px; padding: 0 4px; }
    .day-chip { font-size: 9px; padding: 1px 4px; }
    .dday-badge { font-size: 8px; padding: 1px 4px; }
    .nav-btn { padding: 7px 9px; font-size: 12px; }
    .nav-arrow { width: 32px; height: 32px; font-size: 13px; }
    .hb-spacer { width: 44px; }
    .month-switch { gap: 6px; }
    .btn { padding: 9px 12px; font-size: 13px; }
    .subject-toolbar .btn { padding: 8px 12px; }
  }
  /* 날짜 빠른 편집창 */
  .edit-overlay { display: none; position: fixed; inset: 0; background: rgba(30,30,40,.5); z-index: 1100; justify-content: center; align-items: center; padding: 20px; }
  .edit-overlay.on { display: flex; }
  .edit-box { background: #fff; border-radius: 14px; padding: 18px; max-width: 380px; width: 100%; box-shadow: 0 12px 40px rgba(0,0,0,.25); }
  .edit-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
  .edit-head b { font-size: 16px; color: var(--text-main); }
  .edit-x { background: none; border: none; font-size: 26px; color: var(--text-mute); cursor: pointer; line-height: 1; }
  .edit-rows { display: flex; flex-direction: column; gap: 8px; max-height: 46vh; overflow-y: auto; }
  .ev-row { display: flex; align-items: center; gap: 8px; }
  .ev-color { flex: none; width: 26px; height: 26px; border-radius: 50%; border: 2px solid #ccc; cursor: pointer; padding: 0; }
  .palette-pop { position: absolute; z-index: 1200; background: #fff; border: 1px solid var(--line-strong); border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,.18); padding: 10px; display: none; grid-template-columns: repeat(6, 1fr); gap: 8px; }
  .palette-pop.on { display: grid; }
  .palette-sw { width: 28px; height: 28px; border-radius: 50%; border: 2px solid rgba(0,0,0,.12); cursor: pointer; padding: 0; }
  .palette-sw.sel { box-shadow: 0 0 0 2px #fff, 0 0 0 4px var(--accent); }
  .subject-panel h3 { display: flex; align-items: center; gap: 8px; }
  .subj-color-dot { margin-left: auto; flex: none; width: 22px; height: 22px; border-radius: 50%; border: 2px solid #cfd3da; cursor: pointer; padding: 0; }
  .ev-text { flex: 1; min-width: 0; border: 1px solid var(--line-strong); border-radius: 9px; padding: 10px 11px; font-family: inherit; font-size: 14px; outline: none; color: var(--text-main); background: #fff; }
  .ev-text:focus { border-color: var(--accent); }
  .ev-del { flex: none; background: none; border: none; color: #C62828; font-size: 20px; cursor: pointer; line-height: 1; padding: 0 2px; }
  .edit-hint { font-size: 11.5px; color: var(--text-mute); margin: 8px 2px 0; }
  .edit-addrow { margin-top: 10px; width: 100%; background: none; border: 1px dashed var(--accent); color: var(--accent); border-radius: 9px; padding: 10px; font-weight: 700; cursor: pointer; font-family: inherit; }
  .edit-actions { display: flex; gap: 8px; margin-top: 12px; }
  .edit-btn { flex: 1; text-align: center; padding: 11px; border-radius: 9px; border: 1px solid var(--line-strong); background: var(--surface); color: var(--text-main); font-size: 14px; font-weight: 600; cursor: pointer; text-decoration: none; font-family: inherit; }
  .edit-btn.primary { background: var(--accent); border-color: var(--accent); color: #fff; }
</style>

<meta name="theme-color" content="#0D9488">
<link rel="apple-touch-icon" href="/apple-touch-icon.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">

<script src="/menu.js" defer></script>
</head>
<body>
<div class="container">
  <div class="header-bar">
    <a id="yearLink" href="app.html" class="nav-btn home">📅 연간</a>
    <div class="month-switch">
      <a id="prevMonthBtn" href="#" class="nav-arrow" title="이전달">◀</a>
      <h1 id="monthTitle">월간</h1>
      <a id="nextMonthBtn" href="#" class="nav-arrow" title="다음달">▶</a>
    </div>
    <span class="hb-spacer"></span>
  </div>

  <table class="calendar">
    <thead>
      <tr>
        <th>월</th><th>화</th><th>수</th><th>목</th><th>금</th><th>토</th><th class="sun">일</th>
      </tr>
    </thead>
    <tbody id="calendarBody"></tbody>
  </table>

  <div class="help-box">
    <strong>날짜 칸을 누르면</strong> 바로 입력창이 떠서 일정을 적을 수 있어요. 적은 일정은 달력에 <strong>칩</strong>으로 보이고(줄바꿈=여러 칩), 수행평가는 3일 전부터 D-day가 떠요.
  </div>

  <div class="monthly-plan-box">
    <h3 id="monthPlanTitle">이번 달 목표</h3>
    <textarea class="monthly-plan-area" id="monthlyPlan" placeholder="이번 달에 이루고 싶은 것, 중요한 행사를 적어보세요"></textarea>
  </div>

  <div class="extra-grid">
    <div>
      <h3>📚 보강 · 특강</h3>
      <textarea class="monthly-plan-area" id="extraArea" placeholder="이 달 보강·특강 계획 (과목·기관·일정·교재)"></textarea>
    </div>
  </div>

  <div class="subject-toolbar">
    <button class="btn subject-btn" id="koreanBtn">국어</button>
    <button class="btn subject-btn" id="mathBtn">수학</button>
    <button class="btn subject-btn" id="englishBtn">영어</button>
    <button class="btn subject-btn" id="scienceBtn">과학</button>
    <button class="btn subject-btn" id="socialBtn">사회</button>
  </div>
  <div id="subjectInputs" class="subject-inputs">
    <div id="koreanPanel" class="subject-panel hidden"><h3>국어 교재</h3><div id="koreanArea" class="textbook-edit" contenteditable="true" data-ph="국어 교재를 적어보세요"></div></div>
    <div id="mathPanel" class="subject-panel hidden"><h3>수학 교재</h3><div id="mathArea" class="textbook-edit" contenteditable="true" data-ph="수학 교재를 적어보세요"></div></div>
    <div id="englishPanel" class="subject-panel hidden"><h3>영어 교재</h3><div id="englishArea" class="textbook-edit" contenteditable="true" data-ph="영어 교재를 적어보세요"></div></div>
    <div id="sciencePanel" class="subject-panel hidden"><h3>과학 교재</h3><div id="scienceArea" class="textbook-edit" contenteditable="true" data-ph="과학 교재를 적어보세요"></div></div>
    <div id="socialPanel" class="subject-panel hidden"><h3>사회 교재</h3><div id="socialArea" class="textbook-edit" contenteditable="true" data-ph="사회 교재를 적어보세요"></div></div>
  </div>

  <div class="toolbar">
    <button class="btn" onclick="window.print()">인쇄</button>
    <button class="btn" onclick="resetCalendar()">수행평가 초기화</button>
  </div>

  <div class="legend-info">
    수행평가·시험·학원 발표 등 중요한 일정을 적어두면 한눈에 볼 수 있어요. 오늘 날짜는 진한 색으로 표시됩니다.
  </div>
</div>

<!-- 날짜 칸 빠른 편집 -->
<div id="dayEditModal" class="edit-overlay">
  <div class="edit-box">
    <div class="edit-head"><b id="editTitle">일정 입력</b><button class="edit-x" id="editClose" aria-label="닫기">×</button></div>
    <div id="editRows" class="edit-rows"></div>
    <button id="editAddRow" class="edit-addrow">+ 일정 추가</button>
    <p class="edit-hint">왼쪽 <b>색 동그라미</b>를 누르면 원하는 색을 직접 고를 수 있어요.</p>
    <div class="edit-actions">
      <a id="editDayLink" class="edit-btn">📅 이 날 일정 보기</a>
      <button class="edit-btn primary" id="editSave">저장</button>
    </div>
  </div>
</div>

<div id="savedIndicator" class="saved-indicator">저장됨</div>

<script src="notifications.js"></script>
<script>
  const params = new URLSearchParams(location.search);
  const YEAR = parseInt(params.get('year')) || new Date().getFullYear();
  const MONTH = parseInt(params.get('month')) || (new Date().getMonth() + 1);

  const MIN_YEAR = 2020, MIN_MONTH = 1;
  const MAX_YEAR = 2030, MAX_MONTH = 12;

  const today = new Date();
  const todayStr = `${today.getFullYear()}-${String(today.getMonth()+1).padStart(2,'0')}-${String(today.getDate()).padStart(2,'0')}`;

  document.getElementById('yearLink').href = `app.html?year=${YEAR}`;

  document.getElementById('monthTitle').textContent = `${YEAR}년 ${MONTH}월`;
  document.getElementById('monthPlanTitle').textContent = `${MONTH}월 목표`;
  document.title = `아이담다 · ${YEAR}년 ${MONTH}월`;

  function shiftMonth(delta) {
    let y = YEAR, m = MONTH + delta;
    while (m < 1) { m += 12; y -= 1; }
    while (m > 12) { m -= 12; y += 1; }
    return { y, m };
  }
  const prev = shiftMonth(-1);
  const next = shiftMonth(1);
  const prevBtn = document.getElementById('prevMonthBtn');
  const nextBtn = document.getElementById('nextMonthBtn');

  if (prev.y < MIN_YEAR || (prev.y === MIN_YEAR && prev.m < MIN_MONTH)) {
    prevBtn.style.opacity = '0.4';
    prevBtn.style.pointerEvents = 'none';
  } else {
    prevBtn.href = `month.html?year=${prev.y}&month=${prev.m}`;
  }
  if (next.y > MAX_YEAR || (next.y === MAX_YEAR && next.m > MAX_MONTH)) {
    nextBtn.style.opacity = '0.4';
    nextBtn.style.pointerEvents = 'none';
  } else {
    nextBtn.href = `month.html?year=${next.y}&month=${next.m}`;
  }

  const MONTHLY_PLAN_KEY = `jihoon-monthly-plan-${YEAR}-${MONTH}`;
  const planArea = document.getElementById('monthlyPlan');
  planArea.value = localStorage.getItem(MONTHLY_PLAN_KEY) || '';
  let saveTimer;
  planArea.addEventListener('input', () => {
    localStorage.setItem(MONTHLY_PLAN_KEY, planArea.value);
    showSaved();
  });

  // 보강 · 특강 (월별, 한 칸 통합)
  const NAESIN_KEY = `jihoon-naesin-${YEAR}-${MONTH}`;
  const SPECIAL_KEY = `jihoon-special-${YEAR}-${MONTH}`;
  const EXTRA_KEY = `jihoon-extra-${YEAR}-${MONTH}`;
  const extraArea = document.getElementById('extraArea');
  let extraVal = localStorage.getItem(EXTRA_KEY);
  if (extraVal === null) {
    // 기존 내신보강·특강 데이터를 한 칸으로 통합 (1회 마이그레이션)
    const o1 = (localStorage.getItem(NAESIN_KEY) || '').trim();
    const o2 = (localStorage.getItem(SPECIAL_KEY) || '').trim();
    extraVal = [o1, o2].filter(Boolean).join('\n');
    if (extraVal) localStorage.setItem(EXTRA_KEY, extraVal);
  }
  extraArea.value = extraVal;
  extraArea.addEventListener('input', () => { localStorage.setItem(EXTRA_KEY, extraArea.value); showSaved(); });

  const firstDay = new Date(YEAR, MONTH - 1, 1);
  let firstDayOfWeek = (firstDay.getDay() + 6) % 7;
  const lastDate = new Date(YEAR, MONTH, 0).getDate();

  const tbody = document.getElementById('calendarBody');
  let day = 1, weekIdx = 0;
  const cellByDate = {};

  // 일정별 색 팔레트 (기존 키 호환 유지 + 색 확장)
  const EV_COLORS = {
    gray:   { bg: '#E9EBF3', fg: '#3C3F54' },
    red:    { bg: '#FCE3E3', fg: '#C62828' },
    orange: { bg: '#FFE7D2', fg: '#B5560E' },
    yellow: { bg: '#FBF1C9', fg: '#8A6D00' },
    lime:   { bg: '#E6F4D0', fg: '#5B7A1E' },
    green:  { bg: '#DCF3E3', fg: '#1E7A45' },
    teal:   { bg: '#D2F0EC', fg: '#0B7A70' },
    blue:   { bg: '#DCE7FB', fg: '#2B5FB5' },
    indigo: { bg: '#E0E2FB', fg: '#3F3FB0' },
    purple: { bg: '#ECE0FA', fg: '#6B3FA0' },
    pink:   { bg: '#FBE0EF', fg: '#B23A78' },
    brown:  { bg: '#ECE3DA', fg: '#7A5A3A' }
  };
  const EV_ORDER = ['gray','red','orange','yellow','lime','green','teal','blue','indigo','purple','pink','brown'];
  function readEvColors(dateStr) {
    try { const v = JSON.parse(localStorage.getItem(`jihoon-evcolor-${dateStr}`) || '[]'); return Array.isArray(v) ? v : []; }
    catch (e) { return []; }
  }
  // 일별 화면의 '오늘 일정'(설명회 등)을 월 달력에도 보여준다.
  // 기본 시간블록(잠자는 시간/자습·식사/학교)은 월 달력에선 숨겨 실제 일정만 뜨게 한다.
  const TT_DEFAULTS = ['잠자는 시간', '자습·식사', '학교'];
  function readTimetable(dateStr) {
    try {
      const v = JSON.parse(localStorage.getItem(`timetable_${dateStr}`) || '[]');
      return Array.isArray(v)
        ? v.map(it => ({ time: ((it && it.time) || '').trim(), text: ((it && it.text) || '').trim() }))
            .filter(it => it.text && TT_DEFAULTS.indexOf(it.text) === -1)
        : [];
    } catch (e) { return []; }
  }
  // 일별 화면의 '할 일'(체크리스트) 중 아직 안 한 것을 월 달력에도 보여준다.
  function readTodos(dateStr) {
    try {
      const v = JSON.parse(localStorage.getItem(`todo_${dateStr}`) || '[]');
      return Array.isArray(v)
        ? v.filter(t => t && (t.text || '').trim() && !t.done)
            .map(t => ({ text: (t.text || '').trim(), important: !!t.important }))
        : [];
    } catch (e) { return []; }
  }

  // 한 날짜 칸의 내용(날짜 숫자 + 칩)을 채운다 (편집 후 다시 그릴 때도 사용)
  function fillCell(cell, dateStr) {
    cell.innerHTML = '';
    const parts = dateStr.split('-');
    const dayNum = parseInt(parts[2], 10);
    const dObj = new Date(+parts[0], +parts[1] - 1, +parts[2]); dObj.setHours(0, 0, 0, 0);
    const isSun = dObj.getDay() === 0;
    const isTodayCell = (dateStr === todayStr);
    const holi = window.Holidays ? Holidays.get(dateStr) : null;
    const holiRed = !!(holi && holi.red);

    const top = document.createElement('div');
    top.className = 'day-top';
    const num = document.createElement('span');
    num.className = 'day-number' + ((isSun || holiRed) ? ' sun' : '') + (isTodayCell ? ' today' : '');
    num.textContent = dayNum;
    top.appendChild(num);

    const saved = (localStorage.getItem(`jihoon-assessment-${dateStr}`) || '').trim();
    const lines = saved ? saved.split('\n').map(s => s.trim()).filter(Boolean) : [];
    const sched = readTimetable(dateStr);   // 일별 '오늘 일정'(설명회 등)

    let up = false;
    if (saved) {
      const t = new Date(); t.setHours(0, 0, 0, 0);
      const diff = Math.round((dObj - t) / 86400000);
      up = diff >= 0 && diff <= 3;
      if (up) {
        const badge = document.createElement('span');
        badge.className = 'dday-badge';
        badge.textContent = diff === 0 ? 'D-DAY' : 'D-' + diff;
        badge.style.background = diff === 0 ? '#C62828' : diff === 1 ? '#E53935' : diff === 2 ? '#F57C00' : '#FB8C00';
        top.appendChild(badge);
      }
    }
    cell.appendChild(top);

    // 표시할 칩: 수행평가/일정(assessment) + 일별 '오늘 일정'(timetable) 합쳐서
    const evColors = readEvColors(dateStr);
    const chipItems = [];
    lines.forEach((line, idx) => {
      const c = EV_COLORS[evColors[idx]] || (up ? { bg: '#FFE3D6', fg: '#B5462A' } : EV_COLORS.gray);
      chipItems.push({ text: line, bg: c.bg, fg: c.fg });
    });
    sched.forEach(it => {
      chipItems.push({ text: it.time ? (it.time + ' ' + it.text) : it.text, cls: 'sched' });
    });
    readTodos(dateStr).forEach(t => {
      chipItems.push({ text: '☐ ' + t.text, cls: 'todo-chip' });
    });

    if (holi || chipItems.length) {
      const chips = document.createElement('div');
      chips.className = 'day-chips';
      if (holi) {
        const hc = document.createElement('span');
        hc.className = 'day-chip ' + (holi.red ? 'holi-chip' : 'obs-chip');
        hc.textContent = holi.name;
        chips.appendChild(hc);
      }
      const MAXC = holi ? 2 : 3;
      chipItems.slice(0, MAXC).forEach(ci => {
        const chip = document.createElement('span');
        chip.className = 'day-chip' + (ci.cls ? ' ' + ci.cls : '');
        if (ci.bg) { chip.style.background = ci.bg; chip.style.color = ci.fg; }
        chip.textContent = ci.text;
        chips.appendChild(chip);
      });
      if (chipItems.length > MAXC) {
        const more = document.createElement('span');
        more.className = 'day-more';
        more.textContent = '+' + (chipItems.length - MAXC) + '개 더';
        chips.appendChild(more);
      }
      cell.appendChild(chips);
    }
  }

  while (day <= lastDate) {
    const tr = document.createElement('tr');
    for (let col = 0; col < 7; col++) {
      const td = document.createElement('td');
      if (weekIdx === 0 && col < firstDayOfWeek) {
        td.classList.add('empty-day');
      } else if (day > lastDate) {
        td.classList.add('empty-day');
      } else {
        const currentDay = day;
        const dateStr = `${YEAR}-${String(MONTH).padStart(2,'0')}-${String(currentDay).padStart(2,'0')}`;
        const isToday = (dateStr === todayStr);
        const isSun = (col === 6);

        // 칸을 누르면 바로 그 자리에서 입력 (작은 편집창)
        const cell = document.createElement('div');
        cell.className = 'day-cell';
        if (isToday) cell.classList.add('today-cell');
        cell.title = `${MONTH}월 ${currentDay}일 — 눌러서 입력`;
        fillCell(cell, dateStr);
        cellByDate[dateStr] = cell;
        cell.addEventListener('click', () => openEditor(dateStr, currentDay));

        td.appendChild(cell);
        day++;
      }
      tr.appendChild(td);
    }
    tbody.appendChild(tr);
    weekIdx++;
  }

  // ===== 날짜 칸 빠른 편집 (일정별 색 선택) =====
  let editDate = null;
  const editModal = document.getElementById('dayEditModal');
  const editRows = document.getElementById('editRows');
  const editTitle = document.getElementById('editTitle');
  const editDayLink = document.getElementById('editDayLink');

  function setDot(btn, key) {
    if (!EV_COLORS[key]) key = 'gray';
    btn.dataset.color = key;
    btn.style.background = EV_COLORS[key].bg;
    btn.style.borderColor = EV_COLORS[key].fg;
    btn.title = '색 선택 (탭)';
  }

  // 색 팔레트 팝오버 (원하는 색 직접 선택)
  const palettePop = document.createElement('div');
  palettePop.className = 'palette-pop';
  EV_ORDER.forEach(function (key) {
    const sw = document.createElement('button');
    sw.type = 'button'; sw.className = 'palette-sw'; sw.dataset.color = key;
    sw.style.background = EV_COLORS[key].bg;
    sw.style.borderColor = EV_COLORS[key].fg;
    palettePop.appendChild(sw);
  });
  document.body.appendChild(palettePop);
  let paletteAnchor = null, paletteOnPick = null;
  function openPalette(anchor, curKey, onPick) {
    paletteAnchor = anchor; paletteOnPick = onPick;
    const cur = curKey || 'gray';
    palettePop.querySelectorAll('.palette-sw').forEach(function (s) {
      s.classList.toggle('sel', s.dataset.color === cur);
    });
    const r = anchor.getBoundingClientRect();
    palettePop.classList.add('on');
    const pw = palettePop.offsetWidth, ph = palettePop.offsetHeight;
    let left = r.left + window.scrollX;
    left = Math.min(left, window.scrollX + document.documentElement.clientWidth - pw - 8);
    left = Math.max(left, window.scrollX + 8);
    let top = r.bottom + window.scrollY + 6;
    if (r.bottom + 6 + ph > document.documentElement.clientHeight) top = r.top + window.scrollY - ph - 6;
    palettePop.style.left = left + 'px';
    palettePop.style.top = top + 'px';
  }
  function closePalette() { palettePop.classList.remove('on'); paletteAnchor = null; paletteOnPick = null; }
  palettePop.addEventListener('click', function (e) {
    const sw = e.target.closest('.palette-sw');
    if (!sw || !paletteOnPick) return;
    paletteOnPick(sw.dataset.color);
    closePalette();
  });
  document.addEventListener('click', function (e) {
    if (palettePop.classList.contains('on') && !palettePop.contains(e.target) && !e.target.closest('.ev-color, .subj-color-dot')) closePalette();
  });
  function addRow(text, color) {
    const row = document.createElement('div'); row.className = 'ev-row';
    const dot = document.createElement('button'); dot.type = 'button'; dot.className = 'ev-color';
    setDot(dot, color || 'gray');
    dot.addEventListener('click', function (e) {
      e.stopPropagation();
      if (palettePop.classList.contains('on') && paletteAnchor === dot) { closePalette(); return; }
      openPalette(dot, dot.dataset.color, function (key) { setDot(dot, key); });
    });
    const inp = document.createElement('input'); inp.type = 'text'; inp.className = 'ev-text';
    inp.placeholder = '일정 내용 (예: 수학 수행평가)'; inp.value = text || '';
    inp.addEventListener('keydown', function (e) { if (e.key === 'Enter') { e.preventDefault(); saveEditor(); } });
    const del = document.createElement('button'); del.type = 'button'; del.className = 'ev-del'; del.textContent = '×';
    del.addEventListener('click', function () { row.remove(); });
    row.appendChild(dot); row.appendChild(inp); row.appendChild(del);
    editRows.appendChild(row);
    return inp;
  }
  function openEditor(dateStr, dayNum) {
    editDate = dateStr;
    editTitle.textContent = `${MONTH}월 ${dayNum}일 일정`;
    if (editDayLink) editDayLink.href = `day.html?date=${dateStr}`;
    editRows.innerHTML = '';
    const text = (localStorage.getItem(`jihoon-assessment-${dateStr}`) || '');
    const lines = text.split('\n').map(s => s.trim()).filter(Boolean);
    const colors = readEvColors(dateStr);
    if (lines.length) lines.forEach((l, i) => addRow(l, colors[i] || 'gray'));
    else addRow('', 'gray');
    editModal.classList.add('on');
    setTimeout(() => { const f = editRows.querySelector('.ev-text'); if (f) f.focus(); }, 50);
  }
  function closeEditor() { editModal.classList.remove('on'); }
  function saveEditor() {
    if (editDate === null) return;
    const texts = [], colors = [];
    editRows.querySelectorAll('.ev-row').forEach(function (r) {
      const t = r.querySelector('.ev-text').value.trim();
      if (!t) return;
      texts.push(t);
      colors.push(r.querySelector('.ev-color').dataset.color || 'gray');
    });
    if (texts.length) {
      localStorage.setItem(`jihoon-assessment-${editDate}`, texts.join('\n'));
      localStorage.setItem(`jihoon-evcolor-${editDate}`, JSON.stringify(colors));
    } else {
      localStorage.removeItem(`jihoon-assessment-${editDate}`);
      localStorage.removeItem(`jihoon-evcolor-${editDate}`);
    }
    if (cellByDate[editDate]) fillCell(cellByDate[editDate], editDate);
    showSaved();
    closeEditor();
  }
  document.getElementById('editAddRow').addEventListener('click', function () { const inp = addRow('', 'gray'); if (inp) inp.focus(); });
  document.getElementById('editSave').addEventListener('click', saveEditor);
  document.getElementById('editClose').addEventListener('click', closeEditor);
  editModal.addEventListener('click', (e) => { if (e.target === editModal) closeEditor(); });
  document.addEventListener('keydown', (e) => { if (e.key === 'Escape') closeEditor(); });

  // 과목 교재 색 (시간표 과목 색과 공유: jihoon-subject-colors)
  const SUBJ_KO = { korean: '국어', math: '수학', english: '영어', science: '과학', social: '사회' };
  let subjectColors;
  try { subjectColors = JSON.parse(localStorage.getItem('jihoon-subject-colors') || '{}') || {}; } catch (e) { subjectColors = {}; }
  function tintSubjBtn(btn, key) {
    const c = EV_COLORS[key];
    if (c) { btn.style.background = c.bg; btn.style.color = c.fg; btn.style.borderColor = c.fg; }
    else { btn.style.background = ''; btn.style.color = ''; btn.style.borderColor = ''; }
  }

  const subjects = ['korean', 'math', 'english', 'science', 'social'];
  subjects.forEach(sub => {
    const btn = document.getElementById(`${sub}Btn`);
    const panel = document.getElementById(`${sub}Panel`);
    const area = document.getElementById(`${sub}Area`);
    const koName = SUBJ_KO[sub];
    const STORAGE_KEY = `jihoon-textbook-${sub}-${YEAR}-${MONTH}`;
    // 기존 평문 호환 + 저장된 서식(형광펜) 복원
    const savedTb = localStorage.getItem(STORAGE_KEY) || '';
    if (savedTb && savedTb.indexOf('<') === -1) area.textContent = savedTb;
    else area.innerHTML = savedTb;

    // 패널 제목 옆 색 동그라미 (누르면 팔레트)
    const h3 = panel.querySelector('h3');
    const dot = document.createElement('button');
    dot.type = 'button'; dot.className = 'subj-color-dot'; dot.title = '과목 색 선택';
    function applyColor() {
      const key = subjectColors[koName];
      const c = EV_COLORS[key];
      // 색 동그라미
      const dc = c || { bg: '#fff', fg: '#cfd3da' };
      dot.style.background = dc.bg; dot.style.borderColor = dc.fg;
      // 과목 버튼
      tintSubjBtn(btn, key);
      // 과목 색은 제목·글자색에만 (편집칸 배경은 흰색 유지 → 형광펜이 잘 보이게)
      if (c) { h3.style.color = c.fg; area.style.color = c.fg; }
      else { h3.style.color = ''; area.style.color = ''; }
    }
    applyColor();
    dot.addEventListener('click', function (e) {
      e.stopPropagation();
      if (palettePop.classList.contains('on') && paletteAnchor === dot) { closePalette(); return; }
      openPalette(dot, subjectColors[koName], function (key) {
        subjectColors[koName] = key;
        localStorage.setItem('jihoon-subject-colors', JSON.stringify(subjectColors));
        applyColor(); showSaved();
      });
    });
    h3.appendChild(dot);

    // 형광펜: 선택한 글자에 배경색. (모바일에서 선택이 풀리지 않게 마지막 선택영역 저장·복원)
    let savedRange = null;
    function saveRange() {
      const s = window.getSelection();
      if (s && s.rangeCount && area.contains(s.anchorNode)) savedRange = s.getRangeAt(0).cloneRange();
    }
    area.addEventListener('mouseup', saveRange);
    area.addEventListener('keyup', saveRange);
    area.addEventListener('touchend', saveRange);
    function doHL(col) {
      area.focus();
      if (savedRange) { const s = window.getSelection(); s.removeAllRanges(); s.addRange(savedRange); }
      try { document.execCommand('styleWithCSS', false, true); } catch (e) {}
      if (!document.execCommand('hiliteColor', false, col)) document.execCommand('backColor', false, col);
      localStorage.setItem(STORAGE_KEY, area.innerHTML); showSaved(); saveRange();
    }
    const HL_COLORS = ['#FFF59D', '#C8F7C5', '#FBD3E0', '#CDE7FF', '#FFE0B2', '#E5D4FF'];
    const hlBar = document.createElement('div'); hlBar.className = 'hl-toolbar';
    const hlLabel = document.createElement('span'); hlLabel.className = 'hl-label'; hlLabel.textContent = '형광펜'; hlBar.appendChild(hlLabel);
    HL_COLORS.forEach(function (col) {
      const sw = document.createElement('button'); sw.type = 'button'; sw.className = 'hl-sw'; sw.style.background = col; sw.title = '형광펜';
      sw.addEventListener('mousedown', function (e) { e.preventDefault(); });
      sw.addEventListener('click', function () { doHL(col); });
      hlBar.appendChild(sw);
    });
    const hlClear = document.createElement('button'); hlClear.type = 'button'; hlClear.className = 'hl-sw hl-clear'; hlClear.textContent = '✕'; hlClear.title = '형광펜 빼기';
    hlClear.addEventListener('mousedown', function (e) { e.preventDefault(); });
    hlClear.addEventListener('click', function () { doHL('transparent'); });
    hlBar.appendChild(hlClear);
    panel.insertBefore(hlBar, area);

    btn.addEventListener('click', () => {
      panel.classList.toggle('hidden');
      btn.classList.toggle('active');
    });
    area.addEventListener('input', () => {
      localStorage.setItem(STORAGE_KEY, area.innerHTML);
      showSaved();
    });
  });

  function showSaved() {
    const ind = document.getElementById('savedIndicator');
    ind.classList.add('show');
    clearTimeout(saveTimer);
    saveTimer = setTimeout(() => ind.classList.remove('show'), 1500);
  }

  function resetCalendar() {
    if (confirm(`${MONTH}월의 모든 수행평가 입력 내용을 지울까요?`)) {
      const ym = `${YEAR}-${String(MONTH).padStart(2,'0')}-`;
      const del = [];
      for (let i = 0; i < localStorage.length; i++) {
        const k = localStorage.key(i);
        if (k && (k.indexOf(`jihoon-assessment-${ym}`) === 0 || k.indexOf(`jihoon-evcolor-${ym}`) === 0)) del.push(k);
      }
      del.forEach(k => localStorage.removeItem(k));
      subjects.forEach(sub => {
        localStorage.removeItem(`jihoon-textbook-${sub}-${YEAR}-${MONTH}`);
      });
      location.reload();
    }
  }

</script>
</body>
</html>
