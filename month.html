<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>월간 스케줄표</title>
<style>
  :root {
    --bg: #F2F3F5;
    --surface: #FFFFFF;
    --surface-soft: #EBEDF0;
    --text-main: #17181C;
    --text-sub: #4A4E57;
    --text-mute: #9CA1AB;
    --line: #E2E4E9;
    --line-strong: #C9CDD4;
    --accent: #0D9488;
    --accent-soft: #CCFBF1;
    --accent-dark: #0B7A70;
    --weekend: #DC2626;
    --ink: #1F2430;
    --ink-dark: #11141B;
  }
  * { box-sizing: border-box; }
  body {
    font-family: 'Malgun Gothic', '맑은 고딕', sans-serif;
    background: var(--bg);
    margin: 0;
    padding: 30px 20px;
    color: var(--text-main);
  }
  .container {
    max-width: 1500px;
    margin: 0 auto;
    background: var(--surface);
    border-radius: 16px;
    box-shadow: 0 4px 20px rgba(62,39,35,0.06);
    padding: 36px;
    border: 1px solid var(--line);
  }
  .header-bar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 16px;
    flex-wrap: wrap;
    gap: 8px;
    background: var(--ink);
    padding: 10px 14px;
    border-radius: 10px;
    box-shadow: 0 2px 10px rgba(17,20,27,0.18);
  }
  .nav-btn {
    background: var(--surface);
    color: var(--text-main);
    border: 1px solid var(--line-strong);
    border-radius: 6px;
    padding: 8px 16px;
    cursor: pointer;
    font-size: 13px;
    font-weight: 500;
    text-decoration: none;
    display: inline-block;
    transition: all 0.15s;
  }
  .nav-btn:hover {
    border-color: var(--accent);
    color: var(--accent);
  }
  .nav-btn.home {
    background: var(--accent);
    color: white;
    border-color: var(--accent);
  }
  .nav-btn.home:hover {
    background: var(--accent-dark);
    color: white;
  }
  h1 {
    text-align: center;
    color: var(--text-main);
    margin: 0 0 6px 0;
    font-size: 34px;
    font-weight: 700;
  }
  .subtitle {
    text-align: center;
    color: var(--text-sub);
    margin-bottom: 20px;
    font-size: 14px;
  }

  .monthly-plan-box {
    margin-bottom: 20px;
    padding: 14px 20px;
    background: var(--surface-soft);
    border-left: 3px solid var(--accent);
    border-radius: 6px;
  }
  .monthly-plan-box h3 {
    margin: 0 0 8px 0;
    color: var(--text-main);
    font-size: 14px;
    font-weight: 600;
  }
  .monthly-plan-area {
    width: 100%;
    min-height: 50px;
    padding: 8px 10px;
    border: 1px solid var(--line);
    border-radius: 4px;
    font-family: inherit;
    font-size: 13px;
    resize: vertical;
    background: var(--surface);
    color: var(--text-main);
  }
  .monthly-plan-area:focus { outline: none; border-color: var(--accent); }
  .extra-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 20px; }
  .extra-grid h3 { margin: 0 0 6px; font-size: 14px; font-weight: 600; color: var(--text-main); }
  @media (max-width: 760px) { .extra-grid { grid-template-columns: 1fr; } }

  .help-box {
    background: var(--surface-soft);
    padding: 10px 18px;
    border-radius: 6px;
    margin-bottom: 18px;
    font-size: 13px;
    color: var(--text-sub);
    text-align: center;
    border: 1px solid var(--line);
  }
  .toolbar {
    display: flex;
    justify-content: center;
    gap: 8px;
    margin-bottom: 18px;
    flex-wrap: wrap;
  }
  .btn {
    padding: 7px 16px;
    border: 1px solid var(--line-strong);
    background: var(--surface);
    color: var(--text-main);
    border-radius: 6px;
    cursor: pointer;
    font-size: 13px;
    font-weight: 500;
    transition: background 0.2s, color 0.2s;
  }
  .btn:hover { border-color: var(--accent); color: var(--accent); }
  .subject-btn {
    background: var(--accent-soft);
    color: var(--text-main);
    border: 1px solid var(--accent);
  }
  .subject-btn:hover {
    background: var(--accent);
    color: white;
  }
  .subject-panel {
    margin-top: 12px;
    padding: 10px;
    background: var(--surface-soft);
    border-left: 3px solid var(--accent);
    border-radius: 6px;
  }
  .subject-panel textarea {
    width: 100%;
    height: 80px;
    resize: vertical;
    padding: 6px;
    border: 1px solid var(--line);
    border-radius: 4px;
    font-family: inherit;
    font-size: 13px;
    background: var(--surface);
    color: var(--text-main);
  }
  .hidden { display: none; }
  .subject-toolbar {
    display: flex;
    justify-content: center;
    gap: 8px;
    margin-bottom: 12px;
    flex-wrap: wrap;
  }

  table.calendar {
    width: 100%;
    border-collapse: collapse;
    table-layout: fixed;
  }
  table.calendar th {
    background: var(--surface-soft);
    color: var(--text-main);
    padding: 12px;
    font-size: 14px;
    font-weight: 600;
    border: 1px solid var(--line);
  }
  table.calendar th.sun { color: var(--weekend); }

  table.calendar td {
    border: 1px solid var(--line);
    padding: 0;
    height: 120px;
    vertical-align: top;
    background: var(--surface);
  }
  table.calendar td.empty-day { background: var(--bg); }
  .day-cell {
    height: 100%;
    display: flex;
    flex-direction: column;
    padding: 6px;
  }
  .day-number {
    font-size: 18px;
    font-weight: 600;
    color: var(--text-main);
    text-decoration: none;
    display: inline-block;
    padding: 2px 10px;
    border-radius: 4px;
    transition: all 0.15s;
    align-self: flex-start;
    cursor: pointer;
    border: 1px dashed transparent;
  }
  .day-number:hover {
    background: var(--accent);
    color: white;
    border-color: var(--accent);
  }
  .day-number.today {
    background: var(--accent);
    color: white;
  }
  .day-number.sun { color: var(--weekend); }
  .day-number.today.sun { color: white; }

  .assessment-input {
    flex: 1;
    width: 100%;
    margin-top: 4px;
    padding: 4px 6px;
    border: 1px solid transparent;
    border-radius: 3px;
    background: var(--bg);
    font-family: inherit;
    font-size: 12px;
    resize: none;
    color: var(--text-main);
    outline: none;
    line-height: 1.4;
  }
  .dday-badge {
    align-self: flex-start;
    margin-top: 4px;
    padding: 2px 7px;
    border-radius: 10px;
    color: #fff;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.3px;
  }
  .day-cell.has-upcoming .assessment-input {
    background: #FFF8E1;
    border-color: #FFE082;
  }
  .assessment-input:focus {
    border-color: var(--accent);
    background: var(--surface);
  }
  .assessment-input::placeholder {
    color: var(--text-mute);
  }

  .saved-indicator {
    position: fixed;
    bottom: 20px;
    right: 20px;
    background: var(--accent);
    color: white;
    padding: 10px 18px;
    border-radius: 8px;
    box-shadow: 0 4px 14px rgba(0,137,123,0.3);
    opacity: 0;
    transition: opacity 0.3s;
    z-index: 1000;
    font-size: 13px;
  }
  .saved-indicator.show { opacity: 1; }

  .legend-info {
    margin-top: 24px;
    padding: 14px 20px;
    background: var(--surface-soft);
    border-left: 3px solid var(--accent);
    border-radius: 6px;
    font-size: 13px;
    color: var(--text-sub);
    line-height: 1.7;
  }

  /* 시간표 모달 */
  .modal-overlay {
    display: none;
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(62,39,35,0.5);
    z-index: 999;
    justify-content: center;
    align-items: center;
    padding: 20px;
  }
  .modal-overlay.show { display: flex; }
  .modal-box {
    background: var(--surface);
    border-radius: 14px;
    padding: 28px;
    max-width: 720px;
    width: 100%;
    max-height: 90vh;
    overflow-y: auto;
    box-shadow: 0 12px 40px rgba(0,0,0,0.25);
  }
  .modal-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 16px;
    padding-bottom: 12px;
    border-bottom: 1px solid var(--line);
  }
  .modal-title {
    font-size: 20px;
    font-weight: 700;
    color: var(--text-main);
    margin: 0;
  }
  .modal-close {
    background: transparent;
    border: none;
    font-size: 24px;
    cursor: pointer;
    color: var(--text-sub);
    padding: 0 6px;
    line-height: 1;
  }
  .modal-close:hover { color: var(--text-main); }

  table.timetable {
    width: 100%;
    border-collapse: collapse;
    table-layout: fixed;
  }
  table.timetable th {
    background: var(--surface-soft);
    color: var(--text-main);
    padding: 8px;
    font-size: 13px;
    font-weight: 600;
    border: 1px solid var(--line);
  }
  table.timetable th.period-col { width: 70px; }
  table.timetable td {
    border: 1px solid var(--line);
    padding: 0;
    height: 44px;
    background: var(--surface);
  }
  table.timetable td.period-label {
    background: var(--surface-soft);
    color: var(--text-sub);
    font-size: 12px;
    font-weight: 500;
    text-align: center;
  }
  .subject-input {
    width: 100%;
    height: 100%;
    border: none;
    background: transparent;
    text-align: center;
    font-family: inherit;
    font-size: 13px;
    color: var(--text-main);
    outline: none;
    padding: 4px 6px;
  }
  .subject-input:focus {
    background: #FFFBE6;
    outline: 2px solid var(--accent);
    outline-offset: -2px;
  }
  .subject-input::placeholder {
    color: var(--text-mute);
    font-size: 12px;
  }
  .timetable-hint {
    font-size: 12px;
    color: var(--text-mute);
    margin-top: 12px;
    text-align: center;
  }
  .timetable-actions {
    display: flex;
    justify-content: flex-end;
    gap: 8px;
    margin-top: 14px;
  }

  @media print {
    body { background: white; padding: 0; }
    .container { box-shadow: none; }
    .toolbar, .help-box, .saved-indicator, .nav-btn { display: none !important; }
    .modal-overlay { display: none !important; }
  }
  /* 모바일 최적화 — 달력을 한눈에 */
  @media (max-width: 760px) {
    body { padding: 12px 6px; }
    .container { padding: 14px 10px; border-radius: 12px; }
    h1 { font-size: 24px; }
    .help-box, .legend-info { font-size: 12px; padding: 10px 12px; }
    table.calendar th { padding: 6px 2px; font-size: 12px; }
    table.calendar td { height: 80px; }
    .day-cell { padding: 3px; }
    .day-number { font-size: 14px; padding: 1px 6px; }
    .assessment-input { font-size: 11px; margin-top: 2px; padding: 2px 3px; }
    .nav-btn, .btn { padding: 10px 12px; font-size: 13px; }
    .subject-toolbar .btn { padding: 8px 12px; }
  }
</style>
<link rel="manifest" href="/app.webmanifest">
<meta name="theme-color" content="#0D9488">
<link rel="apple-touch-icon" href="/apple-touch-icon.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="한번에">
<script src="/pwa.js" defer></script>
</head>
<body>
<div class="container">
  <div class="header-bar">
    <a id="yearLink" href="app.html" class="nav-btn home">연간 계획</a>
    <a id="prevMonthBtn" href="#" class="nav-btn">◀ 이전달</a>
    <a id="nextMonthBtn" href="#" class="nav-btn">다음달 ▶</a>
  </div>
<div class="subject-toolbar">
  <button class="btn subject-btn" id="koreanBtn">국어</button>
  <button class="btn subject-btn" id="mathBtn">수학</button>
  <button class="btn subject-btn" id="englishBtn">영어</button>
  <button class="btn subject-btn" id="scienceBtn">과학</button>
  <button class="btn subject-btn" id="socialBtn">사회</button>
</div>
<!-- Subject panels -->
<div id="subjectInputs" class="subject-inputs">
  <div id="koreanPanel" class="subject-panel hidden">
    <h3>국어 교재</h3>
    <textarea id="koreanArea" placeholder="국어 교재를 적어보세요"></textarea>
  </div>
  <div id="mathPanel" class="subject-panel hidden">
    <h3>수학 교재</h3>
    <textarea id="mathArea" placeholder="수학 교재를 적어보세요"></textarea>
  </div>
  <div id="englishPanel" class="subject-panel hidden">
    <h3>영어 교재</h3>
    <textarea id="englishArea" placeholder="영어 교재를 적어보세요"></textarea>
  </div>
  <div id="sciencePanel" class="subject-panel hidden">
    <h3>과학 교재</h3>
    <textarea id="scienceArea" placeholder="과학 교재를 적어보세요"></textarea>
  </div>
  <div id="socialPanel" class="subject-panel hidden">
    <h3>사회 교재</h3>
    <textarea id="socialArea" placeholder="사회 교재를 적어보세요"></textarea>
  </div>
</div>
  <h1 id="monthTitle">월간 스케줄표</h1>
  <p class="subtitle">날짜를 클릭하면 그 날의 자세한 스케줄을 볼 수 있어요</p>

  <div class="monthly-plan-box">
    <h3 id="monthPlanTitle">이번 달 목표</h3>
    <textarea class="monthly-plan-area" id="monthlyPlan" placeholder="이번 달에 이루고 싶은 것, 중요한 행사를 적어보세요"></textarea>
  </div>

  <div class="extra-grid">
    <div>
      <h3>📚 보강 · 특강</h3>
      <textarea class="monthly-plan-area" id="extraArea" placeholder="이 달 보강·특강 계획 (과목·기관·일정·교재)"></textarea>
    </div>
  </div>

  <div class="help-box">
    각 칸의 <strong>흰 박스에 수행평가</strong>를 입력하세요. 왼쪽 위 <strong>날짜 숫자</strong>를 클릭하면 그 날의 일별 스케줄로 이동합니다.
  </div>

  <div class="toolbar">
    <button class="btn" onclick="window.print()">인쇄</button>
    <button class="btn" onclick="resetCalendar()">수행평가 초기화</button>
  </div>

  <table class="calendar">
    <thead>
      <tr>
        <th>월</th>
        <th>화</th>
        <th>수</th>
        <th>목</th>
        <th>금</th>
        <th>토</th>
        <th class="sun">일</th>
      </tr>
    </thead>
    <tbody id="calendarBody"></tbody>
  </table>

  <div class="legend-info">
    수행평가, 시험, 학원 발표 등 중요한 일정을 적어두면 한눈에 볼 수 있어요. 오늘 날짜는 진한 색으로 표시됩니다.
  </div>
</div>

<div id="savedIndicator" class="saved-indicator">저장됨</div>

<script src="notifications.js"></script>
<script>
  const params = new URLSearchParams(location.search);
  const YEAR = parseInt(params.get('year')) || new Date().getFullYear();
  const MONTH = parseInt(params.get('month')) || (new Date().getMonth() + 1);

  const MIN_YEAR = 2020, MIN_MONTH = 1;
  const MAX_YEAR = 2030, MAX_MONTH = 12;

  const today = new Date();
  const todayStr = `${today.getFullYear()}-${String(today.getMonth()+1).padStart(2,'0')}-${String(today.getDate()).padStart(2,'0')}`;

  document.getElementById('yearLink').href = `app.html?year=${YEAR}`;

  const ownerName = localStorage.getItem('jihoon-owner-name') || '';
  const namePrefix = ownerName ? `${ownerName}의 ` : '';
  document.getElementById('monthTitle').textContent = `${namePrefix}${YEAR}년 ${MONTH}월`;
  document.getElementById('monthPlanTitle').textContent = `${MONTH}월 목표`;
  document.title = `한번에 · ${YEAR}년 ${MONTH}월`;

  function shiftMonth(delta) {
    let y = YEAR, m = MONTH + delta;
    while (m < 1) { m += 12; y -= 1; }
    while (m > 12) { m -= 12; y += 1; }
    return { y, m };
  }
  const prev = shiftMonth(-1);
  const next = shiftMonth(1);
  const prevBtn = document.getElementById('prevMonthBtn');
  const nextBtn = document.getElementById('nextMonthBtn');

  if (prev.y < MIN_YEAR || (prev.y === MIN_YEAR && prev.m < MIN_MONTH)) {
    prevBtn.style.opacity = '0.4';
    prevBtn.style.pointerEvents = 'none';
  } else {
    prevBtn.href = `month.html?year=${prev.y}&month=${prev.m}`;
  }
  if (next.y > MAX_YEAR || (next.y === MAX_YEAR && next.m > MAX_MONTH)) {
    nextBtn.style.opacity = '0.4';
    nextBtn.style.pointerEvents = 'none';
  } else {
    nextBtn.href = `month.html?year=${next.y}&month=${next.m}`;
  }

  const MONTHLY_PLAN_KEY = `jihoon-monthly-plan-${YEAR}-${MONTH}`;
  const planArea = document.getElementById('monthlyPlan');
  planArea.value = localStorage.getItem(MONTHLY_PLAN_KEY) || '';
  let saveTimer;
  planArea.addEventListener('input', () => {
    localStorage.setItem(MONTHLY_PLAN_KEY, planArea.value);
    showSaved();
  });

  // 보강 · 특강 (월별, 한 칸 통합)
  const NAESIN_KEY = `jihoon-naesin-${YEAR}-${MONTH}`;
  const SPECIAL_KEY = `jihoon-special-${YEAR}-${MONTH}`;
  const EXTRA_KEY = `jihoon-extra-${YEAR}-${MONTH}`;
  const extraArea = document.getElementById('extraArea');
  let extraVal = localStorage.getItem(EXTRA_KEY);
  if (extraVal === null) {
    // 기존 내신보강·특강 데이터를 한 칸으로 통합 (1회 마이그레이션)
    const o1 = (localStorage.getItem(NAESIN_KEY) || '').trim();
    const o2 = (localStorage.getItem(SPECIAL_KEY) || '').trim();
    extraVal = [o1, o2].filter(Boolean).join('\n');
    if (extraVal) localStorage.setItem(EXTRA_KEY, extraVal);
  }
  extraArea.value = extraVal;
  extraArea.addEventListener('input', () => { localStorage.setItem(EXTRA_KEY, extraArea.value); showSaved(); });

  const firstDay = new Date(YEAR, MONTH - 1, 1);
  let firstDayOfWeek = (firstDay.getDay() + 6) % 7;
  const lastDate = new Date(YEAR, MONTH, 0).getDate();

  const tbody = document.getElementById('calendarBody');
  let day = 1, weekIdx = 0;

  while (day <= lastDate) {
    const tr = document.createElement('tr');
    for (let col = 0; col < 7; col++) {
      const td = document.createElement('td');
      if (weekIdx === 0 && col < firstDayOfWeek) {
        td.classList.add('empty-day');
      } else if (day > lastDate) {
        td.classList.add('empty-day');
      } else {
        const currentDay = day;
        const dateStr = `${YEAR}-${String(MONTH).padStart(2,'0')}-${String(currentDay).padStart(2,'0')}`;
        const isToday = (dateStr === todayStr);
        const isSun = (col === 6);

        const cell = document.createElement('div');
        cell.className = 'day-cell';

        const link = document.createElement('a');
        link.className = 'day-number';
        if (isSun) link.classList.add('sun');
        if (isToday) link.classList.add('today');
        link.href = `day.html?date=${dateStr}`;
        link.textContent = currentDay;
        link.title = `${MONTH}월 ${currentDay}일 스케줄`;
        cell.appendChild(link);

        const textarea = document.createElement('textarea');
        textarea.className = 'assessment-input';
        textarea.placeholder = '수행평가...';
        textarea.dataset.date = dateStr;
        const saved = localStorage.getItem(`jihoon-assessment-${dateStr}`);
        if (saved) textarea.value = saved;

        const updateDdayBadge = () => {
          const existing = cell.querySelector('.dday-badge');
          if (existing) existing.remove();
          cell.classList.remove('has-upcoming');
          const txt = (textarea.value || '').trim();
          if (!txt) return;
          const t = new Date(); t.setHours(0,0,0,0);
          const d = new Date(YEAR, MONTH - 1, currentDay); d.setHours(0,0,0,0);
          const diff = Math.round((d - t) / 86400000);
          if (diff < 0 || diff > 3) return;
          const badge = document.createElement('span');
          badge.className = 'dday-badge';
          badge.textContent = diff === 0 ? 'D-DAY' : 'D-' + diff;
          badge.style.background = diff === 0 ? '#C62828'
            : diff === 1 ? '#E53935'
            : diff === 2 ? '#F57C00' : '#FB8C00';
          cell.insertBefore(badge, textarea);
          cell.classList.add('has-upcoming');
        };

        textarea.addEventListener('input', () => {
          localStorage.setItem(`jihoon-assessment-${dateStr}`, textarea.value);
          updateDdayBadge();
          showSaved();
        });
        ['mousedown','click','focus','pointerdown','touchstart'].forEach(ev => {
          textarea.addEventListener(ev, (e) => e.stopPropagation());
        });
        cell.appendChild(textarea);
        updateDdayBadge();

        td.appendChild(cell);
        day++;
      }
      tr.appendChild(td);
    }
    tbody.appendChild(tr);
    weekIdx++;
  }

  const subjects = ['korean', 'math', 'english', 'science', 'social'];
  subjects.forEach(sub => {
    const btn = document.getElementById(`${sub}Btn`);
    const panel = document.getElementById(`${sub}Panel`);
    const area = document.getElementById(`${sub}Area`);
    const STORAGE_KEY = `jihoon-textbook-${sub}-${YEAR}-${MONTH}`;
    area.value = localStorage.getItem(STORAGE_KEY) || '';
    btn.addEventListener('click', () => {
      panel.classList.toggle('hidden');
      btn.classList.toggle('active');
    });
    area.addEventListener('input', () => {
      localStorage.setItem(STORAGE_KEY, area.value);
      showSaved();
    });
  });

  function showSaved() {
    const ind = document.getElementById('savedIndicator');
    ind.classList.add('show');
    clearTimeout(saveTimer);
    saveTimer = setTimeout(() => ind.classList.remove('show'), 1500);
  }

  function resetCalendar() {
    if (confirm(`${MONTH}월의 모든 수행평가 입력 내용을 지울까요?`)) {
      document.querySelectorAll('.assessment-input').forEach(ta => {
        localStorage.removeItem(`jihoon-assessment-${ta.dataset.date}`);
        ta.value = '';
        const parent = ta.parentElement;
        const badge = parent && parent.querySelector('.dday-badge');
        if (badge) badge.remove();
        if (parent) parent.classList.remove('has-upcoming');
      });
      subjects.forEach(sub => {
        localStorage.removeItem(`jihoon-textbook-${sub}-${YEAR}-${MONTH}`);
        document.getElementById(`${sub}Area`).value = '';
      });
    }
  }

</script>
</body>
</html>
